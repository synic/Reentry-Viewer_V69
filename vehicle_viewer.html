                        this.particles[i].update(dt);
                        activeCount++;
                    }
                }

                this.updateBuffers();
                return activeCount;
            }

            updateBuffers() {
                const geo = this.mesh.geometry;
                const positions = geo.attributes.position.array;
                const colors = geo.attributes.color.array;
                const sizes = geo.attributes.size.array;
                const alphas = geo.attributes.alpha.array;
                const stretches = geo.attributes.stretch.array;

                let idx = 0;
                for (let i = 0; i < this.maxParticles; i++) {
                    const p = this.particles[i];
                    if (p.active) {
                        positions[idx * 3] = p.position.x;
                        positions[idx * 3 + 1] = p.position.y;
                        positions[idx * 3 + 2] = p.position.z;

                        colors[idx * 3] = p.color.r * p.brightness;
                        colors[idx * 3 + 1] = p.color.g * p.brightness;
                        colors[idx * 3 + 2] = p.color.b * p.brightness;

                        sizes[idx] = p.currentSize;
                        alphas[idx] = p.alpha;
                        stretches[idx] = p.stretch;
                        idx++;
                    }
                }

                for (let i = idx; i < this.maxParticles; i++) {
                    sizes[i] = 0;
                    alphas[i] = 0;
                }

                geo.attributes.position.needsUpdate = true;
                geo.attributes.color.needsUpdate = true;
                geo.attributes.size.needsUpdate = true;
                geo.attributes.alpha.needsUpdate = true;
                geo.attributes.stretch.needsUpdate = true;
            }

            clear() {
                for (let i = 0; i < this.maxParticles; i++) {
                    this.particles[i].active = false;
                }
                this.updateBuffers();
            }
        }

        const plasmaEmitter = new PlasmaEmitter(3000);

        // Smoothstep helper
        function smoothstep(edge0, edge1, x) {
            const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
            return t * t * (3 - 2 * t);
        }

        // Get heat color based on flux
        function getHeatColor(flux) {
            const c = new THREE.Color();
            if (flux < 400) c.lerpColors(COLOR_COLD, COLOR_DARK_RED, flux / 400);
            else if (flux < 1000) c.lerpColors(COLOR_DARK_RED, COLOR_RED, (flux - 400) / 600);
            else if (flux < 1800) c.lerpColors(COLOR_RED, COLOR_ORANGE, (flux - 1000) / 800);
            else if (flux < 2600) c.lerpColors(COLOR_ORANGE, COLOR_YELLOW, (flux - 1800) / 800);
            else c.lerpColors(COLOR_YELLOW, COLOR_WHITE, Math.min((flux - 2600) / 1400, 1));
            return c;
        }

        // Heat shield material
        function createHeatShieldMaterial() {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    heatFlux: { value: 0 },
                    maxHeatFlux: { value: 4000.0 },
                    baseColor: { value: new THREE.Color(0x2a2a2a) },  // Original dark grey
                    charColor: { value: new THREE.Color(0x1a1a1a) },  // Deep char black
                    emberColor: { value: new THREE.Color(0xff4400) }, // Hot ember orange
                    glowColor: { value: new THREE.Color(0xff2200) },  // Deep red glow
                    ambientLight: { value: new THREE.Color(0x404040) },
                    lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() },
                    lightColor: { value: new THREE.Color(0xffffff) }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vWorldPosition;
                    varying vec2 vUv;
                    varying vec3 vViewDir;

                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;

                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPos.xyz;

                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vViewDir = -mvPosition.xyz;

                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform float heatFlux;
                    uniform float maxHeatFlux;
                    uniform vec3 baseColor;
                    uniform vec3 charColor;
                    uniform vec3 emberColor;
                    uniform vec3 glowColor;
                    uniform vec3 ambientLight;
                    uniform vec3 lightDir;
                    uniform vec3 lightColor;

                    varying vec3 vNormal;
                    varying vec3 vWorldPosition;
                    varying vec2 vUv;
                    varying vec3 vViewDir;

                    // Noise functions for procedural patterns
                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + 0.1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
                    }

                    float noise(vec3 p) {
                        vec3 i = floor(p);
                        vec3 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        return mix(
                            mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
                                mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                            mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                                mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
                    }

                    // FBM for multi-scale char patterns
                    float fbm(vec3 p) {
                        float value = 0.0;
                        float amplitude = 0.5;
                        for (int i = 0; i < 5; i++) {
                            value += amplitude * noise(p);
                            p *= 2.0;
                            amplitude *= 0.5;
                        }
                        return value;
                    }

                    // Cellular/Voronoi-like pattern for char cracks
                    float cellPattern(vec3 p) {
                        vec3 i = floor(p);
                        vec3 f = fract(p);
                        float minDist = 1.0;
                        for (int x = -1; x <= 1; x++) {
                            for (int y = -1; y <= 1; y++) {
                                for (int z = -1; z <= 1; z++) {
                                    vec3 neighbor = vec3(float(x), float(y), float(z));
                                    vec3 point = neighbor + hash(i + neighbor) - f;
                                    float dist = length(point);
                                    minDist = min(minDist, dist);
                                }
                            }
                        }
                        return minDist;
                    }

                    void main() {
                        float heatLevel = clamp(heatFlux / maxHeatFlux, 0.0, 1.0);

                        // =====================================================
                        // 3. PROCEDURAL CHAR PATTERNS
                        // =====================================================
                        vec3 noiseCoord = vWorldPosition * 0.15;

                        // Multi-scale char pattern
                        float charPattern = fbm(noiseCoord * 2.0);

                        // Add cellular cracks at higher heat
                        float cracks = cellPattern(noiseCoord * 3.0);
                        float crackIntensity = smoothstep(0.0, 0.15, cracks);

                        // Streaky ablation pattern (flowing downstream in X direction)
                        float streaks = fbm(vec3(noiseCoord.x * 0.5, noiseCoord.y * 2.0, noiseCoord.z * 2.0));

                        // Combine patterns
                        float combinedPattern = charPattern * 0.6 + streaks * 0.4;

                        // =====================================================
                        // 1. PROGRESSIVE COLOR DARKENING (Light Application)
                        // =====================================================
                        // Very subtle darkening - just a hint of char
                        float charAmount = heatLevel * 0.3 * combinedPattern;  // Light application
                        charAmount = clamp(charAmount, 0.0, 0.4);  // Cap at 40% char

                        vec3 surfaceColor = mix(baseColor, charColor, charAmount);

                        // =====================================================
                        // 2. GLOWING EMBERS THROUGH CHAR (subtle at low heat)
                        // =====================================================
                        // Embers only appear at higher heat flux
                        float emberThreshold = 0.3;
                        float emberStrength = smoothstep(emberThreshold, 0.8, heatLevel);

                        // Ember pattern - hot spots peeking through cracks
                        float emberPattern = (1.0 - crackIntensity) * combinedPattern;
                        emberPattern += noise(noiseCoord * 8.0 + time * 2.0) * 0.3;  // Flickering

                        // Ember glow with pulsing
                        float pulse = sin(time * 8.0 + vWorldPosition.x * 3.0) * 0.15 + 0.85;
                        float emberGlow = emberStrength * emberPattern * pulse;
                        emberGlow = clamp(emberGlow, 0.0, 1.0);

                        // Color of embers - orange to red based on intensity
                        vec3 emberFinal = mix(glowColor, emberColor, emberGlow * 0.5);

                        // =====================================================
                        // 3. INTENSE THERMAL RADIATION (white-hot at peak)
                        // =====================================================
                        // Thermal radiation color progression: dull red → orange → yellow → white
                        // Based on blackbody radiation temperature progression

                        // Start glow at ~200 kW/m² (5% of 4000 max)
                        float thermalStart = 0.05;
                        float thermalIntensity = smoothstep(thermalStart, 1.0, heatLevel);

                        // Intensity curve - visible early, grows to very bright at peak
                        // Use sqrt for early visibility, then boost at high end
                        float earlyGlow = sqrt(thermalIntensity) * 1.5;  // Visible early
                        float peakGlow = pow(thermalIntensity, 2.0) * 4.0;  // Intense at peak
                        float intensityCurve = earlyGlow + peakGlow;

                        // Define thermal color stages (blackbody-inspired)
                        vec3 dullRed = vec3(0.5, 0.08, 0.03);      // ~800K - visible red
                        vec3 cherryRed = vec3(0.85, 0.18, 0.06);   // ~1000K
                        vec3 brightOrange = vec3(1.0, 0.45, 0.12); // ~1200K
                        vec3 yellowHot = vec3(1.0, 0.78, 0.35);    // ~1500K
                        vec3 whiteHot = vec3(1.0, 0.95, 0.88);     // ~2000K+

                        // 5-stage color progression (starts at 5% / 200 kW/m²)
                        vec3 thermalColor;
                        if (heatLevel < 0.12) {
                            // Dull red phase (5-12% heat / 200-480 kW/m²)
                            float t = smoothstep(thermalStart, 0.12, heatLevel);
                            thermalColor = mix(dullRed * 0.5, dullRed, t);
                        } else if (heatLevel < 0.30) {
                            // Dull red to cherry red (12-30% heat)
                            float t = (heatLevel - 0.12) / 0.18;
                            thermalColor = mix(dullRed, cherryRed, t);
                        } else if (heatLevel < 0.50) {
                            // Cherry red to bright orange (30-50% heat)
                            float t = (heatLevel - 0.30) / 0.20;
                            thermalColor = mix(cherryRed, brightOrange, t);
                        } else if (heatLevel < 0.70) {
                            // Bright orange to yellow-hot (50-70% heat)
                            float t = (heatLevel - 0.50) / 0.20;
                            thermalColor = mix(brightOrange, yellowHot, t);
                        } else {
                            // Yellow-hot to white-hot (70-100% heat)
                            float t = (heatLevel - 0.70) / 0.30;
                            thermalColor = mix(yellowHot, whiteHot, t);
                        }

                        // Intensity multiplier - gets VERY bright at peak
                        float peakBoost = smoothstep(0.7, 1.0, heatLevel) * 4.0;
                        float totalIntensity = intensityCurve * (1.0 + peakBoost);

                        // =====================================================
                        // CHAR MODULATION OF THERMAL GLOW (EXTREME AT PEAK)
                        // =====================================================
                        // Charred areas glow MUCH less intensely at peak heat
                        // Ramp up dramatically above 70% heat
                        float peakCharBoost = smoothstep(0.7, 1.0, heatLevel);
                        float charDepth = 0.3 + peakCharBoost * 0.7;  // Goes from 0.3 to 1.0

                        // Combine char patterns with STRONG contrast
                        float charModulation = 1.0 - (combinedPattern * charDepth * 1.5);

                        // Add very dark patches/streaks at peak heat
                        float darkPatches = fbm(noiseCoord * 1.2 + 0.5);
                        float darkStreaks = fbm(vec3(noiseCoord.x * 0.3, noiseCoord.y * 2.5, noiseCoord.z * 2.5));
                        float combinedDark = max(darkPatches, darkStreaks) * peakCharBoost * 0.6;
                        charModulation -= combinedDark;

                        // Deep cracks glow much hotter - molten material visible
                        float crackGlow = (1.0 - crackIntensity) * peakCharBoost * 0.5;
                        charModulation += crackGlow;

                        // EXTREME range at peak (0.1 to 1.4 - very high contrast)
                        charModulation = clamp(charModulation, 0.1, 1.4);

                        // Add subtle flickering at high temperatures
                        float flicker = 1.0;
                        if (heatLevel > 0.5) {
                            flicker = 0.92 + noise(noiseCoord * 5.0 + time * 15.0) * 0.16;
                        }

                        // =====================================================
                        // BASIC LIGHTING
                        // =====================================================
                        vec3 normal = normalize(vNormal);
                        float diffuse = max(dot(normal, lightDir), 0.0);

                        // Ambient + diffuse (fades as thermal glow dominates)
                        float lightFade = 1.0 - smoothstep(0.3, 0.8, heatLevel);
                        vec3 litColor = surfaceColor * (ambientLight + lightColor * diffuse * 0.6) * lightFade;

                        // =====================================================
                        // COMBINE: Surface + Ember Glow + Thermal Radiation
                        // =====================================================
                        // Start with lit surface
                        vec3 finalColor = litColor;

                        // Add subtle ember glow in cracks (only at moderate heat)
                        float emberContrib = emberGlow * (1.0 - smoothstep(0.6, 0.9, heatLevel));
                        finalColor += emberFinal * emberContrib * 1.5;

                        // Add dominant thermal radiation glow (full brightness)
                        finalColor += thermalColor * totalIntensity * flicker;

                        // Bloom/oversaturation at extreme heat
                        if (heatLevel > 0.8) {
                            float bloom = (heatLevel - 0.8) / 0.2;
                            finalColor += vec3(1.0, 0.98, 0.95) * bloom * bloom * 2.0;
                        }

                        // =====================================================
                        // OVERLAY CHAR PATTERNS ON TOP (subtractive)
                        // =====================================================
                        // At peak heat, SUBTRACT dark char patterns from the bright glow
                        float peakCharOverlay = smoothstep(0.5, 0.9, heatLevel);

                        // Create visible dark char texture - STRONGER patterns
                        float charOverlay = combinedPattern * 0.7 + darkPatches * 0.6;

                        // Add larger scale dark splotches - MORE prominent
                        float largeSplotches = fbm(noiseCoord * 0.6) * 0.6;
                        charOverlay += largeSplotches;

                        // Streaky ablation marks - STRONGER
                        float ablationStreaks = fbm(vec3(noiseCoord.x * 0.15, noiseCoord.y * 4.0, noiseCoord.z * 4.0));
                        charOverlay += ablationStreaks * 0.5;

                        // Deep char cracks
                        float deepCracks = (1.0 - crackIntensity) * 0.4;
                        charOverlay += deepCracks;

                        // Calculate how much to darken - MUCH stronger at peak
                        float brightness = (finalColor.r + finalColor.g + finalColor.b) / 3.0;
                        float darkenAmount = charOverlay * peakCharOverlay * min(brightness * 0.6, 1.2);

                        // Extra darkening boost at very peak heat
                        float peakBoostChar = smoothstep(0.85, 1.0, heatLevel) * 0.4;
                        darkenAmount *= (1.0 + peakBoostChar);

                        // Subtract darkness (char) from final color
                        // Use warm dark tone so it looks like char, not just dimming
                        vec3 charDarkening = vec3(darkenAmount * 1.0, darkenAmount * 0.9, darkenAmount * 0.75);
                        finalColor -= charDarkening;

                        // Ensure we don't go negative
                        finalColor = max(finalColor, vec3(0.0));

                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                lights: false
            });
        }

        // Global time for heat shield shader
        let heatShieldTime = 0;

        // ================================================================
        // TUMBLING MOTION SYSTEM
        // ================================================================

        function initTumbleState() {
            phaseTimer = 0;
            phaseDuration = getRestDuration();
            isResting = true;
            oscillationTime = 0;
            oscillationAmplitudeScale = 1.0;
            targetOscAmplitude = 1.0;
            tumbleAngularVelocity = 0;
            tumbleTargetVelocity = 0;
            randomizeOscillation();
            pickNewTumbleTarget();
            if (currentVehicle) {
                tumbleCurrentQuat.copy(currentVehicle.quaternion);
            }
        }

        function randomizeOscillation() {
            // Random frequencies for each axis (different so motion isn't circular)
            oscillationFreqX = 0.25 + Math.random() * 0.5;
            oscillationFreqY = 0.2 + Math.random() * 0.4;
            oscillationFreqZ = 0.22 + Math.random() * 0.45;

            // Random amplitudes (small wobble, 3-10 degrees)
            oscillationAmpX = (3 + Math.random() * 7) * Math.PI / 180;
            oscillationAmpY = (3 + Math.random() * 7) * Math.PI / 180;
            oscillationAmpZ = (3 + Math.random() * 7) * Math.PI / 180;

            // Random phases
            oscillationPhaseX = Math.random() * Math.PI * 2;
            oscillationPhaseY = Math.random() * Math.PI * 2;
            oscillationPhaseZ = Math.random() * Math.PI * 2;
        }

        function getRestDuration() {
            // Rest/oscillate for 2-6 seconds
            return 2.0 + Math.random() * 4.0;
        }

        function getMoveDuration() {
            // Move for 3-8 seconds before next rest
            return 3.0 + Math.random() * 5.0;
        }

        function getRotationSpeed() {
            // Mostly slow, occasionally faster
            if (Math.random() < 0.12) {
                return 0.3 + Math.random() * 0.4;  // Faster (rad/sec)
            } else {
                return 0.08 + Math.random() * 0.15;  // Slow drift (rad/sec)
            }
        }

        function pickNewTumbleTarget() {
            // Random rotation axis
            tumbleAxis.set(
                Math.random() - 0.5,
                Math.random() - 0.5,
                Math.random() - 0.5
            ).normalize();

            tumbleTargetVelocity = getRotationSpeed();
        }

        function applyOscillation(baseQuat, amplitudeScale = 1.0) {
            const wobbleX = Math.sin(oscillationTime * oscillationFreqX * Math.PI * 2 + oscillationPhaseX) * oscillationAmpX * amplitudeScale;
            const wobbleY = Math.sin(oscillationTime * oscillationFreqY * Math.PI * 2 + oscillationPhaseY) * oscillationAmpY * amplitudeScale;
            const wobbleZ = Math.sin(oscillationTime * oscillationFreqZ * Math.PI * 2 + oscillationPhaseZ) * oscillationAmpZ * amplitudeScale;

            const wobbleQuat = new THREE.Quaternion();
            const euler = new THREE.Euler(wobbleX, wobbleY, wobbleZ, 'XYZ');
            wobbleQuat.setFromEuler(euler);

            const result = new THREE.Quaternion();
            result.copy(baseQuat);
            result.multiply(wobbleQuat);
            return result;
        }

        function updateTumble(dt) {
            if (!currentVehicleConfig || !currentVehicleConfig.isTumbling || !currentVehicle) return;

            phaseTimer += dt;
            oscillationTime += dt;

            // Smoothly blend oscillation amplitude toward target
            const ampBlendRate = 0.8;  // How fast amplitude changes
            oscillationAmplitudeScale += (targetOscAmplitude - oscillationAmplitudeScale) * ampBlendRate * dt;

            // Smoothly blend angular velocity toward target
            const velBlendRate = 1.2;  // How fast velocity changes
            tumbleAngularVelocity += (tumbleTargetVelocity - tumbleAngularVelocity) * velBlendRate * dt;

            // Check for phase transitions
            if (phaseTimer >= phaseDuration) {
                phaseTimer = 0;
                isResting = !isResting;

                if (isResting) {
                    // Entering rest phase - slow down and oscillate more
                    phaseDuration = getRestDuration();
                    tumbleTargetVelocity = 0;
                    targetOscAmplitude = 1.0;
                    // Slight randomization of oscillation
                    if (Math.random() < 0.5) {
                        randomizeOscillation();
                    }
                } else {
                    // Entering move phase - speed up and reduce oscillation
                    phaseDuration = getMoveDuration();
                    pickNewTumbleTarget();
                    targetOscAmplitude = 0.15;  // Keep small oscillation during movement
                }
            }

            // Apply continuous rotation based on current angular velocity
            if (tumbleAngularVelocity > 0.001) {
                const deltaAngle = tumbleAngularVelocity * dt;
                const deltaQuat = new THREE.Quaternion();
                deltaQuat.setFromAxisAngle(tumbleAxis, deltaAngle);
                tumbleCurrentQuat.multiply(deltaQuat);
                tumbleCurrentQuat.normalize();
            }

            // Apply oscillation on top of current orientation
            const finalQuat = applyOscillation(tumbleCurrentQuat, oscillationAmplitudeScale);
            currentVehicle.quaternion.copy(finalQuat);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ================================================================
        // DYNAMIC WINDWARD HEATING SYSTEM (for School Bus)
        // ================================================================
        // Heats all surfaces based on their angle to velocity vector
        // with gradient from stagnation point

        function createDynamicHeatMaterial() {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    heatFlux: { value: 0 },
                    maxHeatFlux: { value: 4000.0 },
                    velocityDir: { value: new THREE.Vector3(1, 0, 0) },
                    baseColor: { value: new THREE.Color(0xccaa00) },  // School bus yellow
                    charColor: { value: new THREE.Color(0x1a1a1a) },
                    ambientLight: { value: new THREE.Color(0x404040) },
                    lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() },
                    lightColor: { value: new THREE.Color(0xffffff) }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    varying vec2 vUv;

                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;

                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPos.xyz;
                        vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);

                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform float heatFlux;
                    uniform float maxHeatFlux;
                    uniform vec3 velocityDir;
                    uniform vec3 baseColor;
                    uniform vec3 charColor;
                    uniform vec3 ambientLight;
                    uniform vec3 lightDir;
                    uniform vec3 lightColor;

                    varying vec3 vNormal;
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    varying vec2 vUv;

                    // Noise functions
                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + 0.1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
                    }

                    float noise(vec3 p) {
                        vec3 i = floor(p);
                        vec3 f = fract(p);
                        f = f * f * (3.0 - 2.0 * f);
                        return mix(
                            mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
                                mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                            mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                                mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
                    }

                    float fbm(vec3 p) {
                        float value = 0.0;
                        float amplitude = 0.5;
                        for (int i = 0; i < 4; i++) {
                            value += amplitude * noise(p);
                            p *= 2.0;
                            amplitude *= 0.5;
                        }
                        return value;
                    }

                    void main() {
                        float heatLevel = clamp(heatFlux / maxHeatFlux, 0.0, 1.0);

                        // Calculate windward factor: how much this surface faces velocity
                        // dot product of normal with velocity direction
                        // +1 = directly facing flow (stagnation point)
                        // 0 = perpendicular
                        // -1 = facing away (leeward, no heating)
                        float windwardDot = dot(vWorldNormal, velocityDir);
                        float windwardFactor = clamp(windwardDot, 0.0, 1.0);

                        // Stagnation point heating - exponential falloff from direct impact
                        // Surfaces directly facing flow get most heat
                        float stagnationFactor = pow(windwardFactor, 1.5);

                        // Effective heat level for this surface
                        float surfaceHeat = heatLevel * stagnationFactor;

                        // Thermal color progression
                        vec3 dullRed = vec3(0.5, 0.08, 0.03);
                        vec3 cherryRed = vec3(0.85, 0.18, 0.06);
                        vec3 brightOrange = vec3(1.0, 0.45, 0.12);
                        vec3 yellowHot = vec3(1.0, 0.78, 0.35);
                        vec3 whiteHot = vec3(1.0, 0.95, 0.88);

                        vec3 thermalColor;
                        float thermalStart = 0.05;

                        if (surfaceHeat < 0.12) {
                            float t = smoothstep(thermalStart, 0.12, surfaceHeat);
                            thermalColor = mix(dullRed * 0.5, dullRed, t);
                        } else if (surfaceHeat < 0.30) {
                            float t = (surfaceHeat - 0.12) / 0.18;
                            thermalColor = mix(dullRed, cherryRed, t);
                        } else if (surfaceHeat < 0.50) {
                            float t = (surfaceHeat - 0.30) / 0.20;
                            thermalColor = mix(cherryRed, brightOrange, t);
                        } else if (surfaceHeat < 0.70) {
                            float t = (surfaceHeat - 0.50) / 0.20;
                            thermalColor = mix(brightOrange, yellowHot, t);
                        } else {
                            float t = (surfaceHeat - 0.70) / 0.30;
                            thermalColor = mix(yellowHot, whiteHot, t);
                        }

                        // Intensity calculation
                        float thermalIntensity = smoothstep(thermalStart, 1.0, surfaceHeat);
                        float earlyGlow = sqrt(thermalIntensity) * 1.5;
                        float peakGlow = pow(thermalIntensity, 2.0) * 4.0;
                        float totalIntensity = earlyGlow + peakGlow;

                        // Charring effect on heated surfaces
                        vec3 noiseCoord = vWorldPosition * 0.1;
                        float charPattern = fbm(noiseCoord * 2.0);
                        float charAmount = surfaceHeat * 0.5 * charPattern;
                        charAmount = clamp(charAmount, 0.0, 0.6);

                        // Base surface color with charring
                        vec3 surfaceColor = mix(baseColor, charColor, charAmount);

                        // Basic lighting
                        vec3 normal = normalize(vNormal);
                        float diffuse = max(dot(normal, lightDir), 0.0);
                        float lightFade = 1.0 - smoothstep(0.2, 0.7, surfaceHeat);
                        vec3 litColor = surfaceColor * (ambientLight + lightColor * diffuse * 0.6) * lightFade;

                        // Add thermal glow
                        vec3 finalColor = litColor;
                        if (surfaceHeat > thermalStart) {
                            // Flickering
                            float flicker = 0.92 + noise(noiseCoord * 5.0 + time * 15.0) * 0.16;
                            finalColor += thermalColor * totalIntensity * flicker;

                            // Bloom at high heat
                            if (surfaceHeat > 0.7) {
                                float bloom = (surfaceHeat - 0.7) / 0.3;
                                finalColor += vec3(1.0, 0.98, 0.95) * bloom * bloom * 1.5;
                            }
                        }

                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                lights: false
            });
        }

        function setupDynamicHeating() {
            if (!currentVehicle || !currentVehicleConfig || !currentVehicleConfig.dynamicHeatShield) return;

            allVehicleMeshes = [];
            dynamicHeatMaterials.clear();

            // Find all meshes in the vehicle
            currentVehicle.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    allVehicleMeshes.push(child);

                    // Store original material
                    if (!originalMaterials.has(child)) {
                        originalMaterials.set(child, child.material.clone());
                    }

                    // Create dynamic heat material for this mesh
                    const heatMat = createDynamicHeatMaterial();

                    // Try to preserve original base color
                    const origMat = originalMaterials.get(child);
                    if (origMat && origMat.color) {
                        heatMat.uniforms.baseColor.value.copy(origMat.color);
                    }

                    dynamicHeatMaterials.set(child, heatMat);
                    child.material = heatMat;
                }
            });

            // For dynamic heat shields, use all meshes as "heat shield" for bow shock generation
            heatShieldMeshes = allVehicleMeshes;
        }

        function updateDynamicHeating(flux, dt) {
            if (!currentVehicleConfig || !currentVehicleConfig.dynamicHeatShield) return;

            const velocityDir = new THREE.Vector3(1, 0, 0);  // Velocity is +X

            allVehicleMeshes.forEach(mesh => {
                const material = dynamicHeatMaterials.get(mesh);
                if (material && material.uniforms) {
                    material.uniforms.time.value = heatShieldTime;
                    material.uniforms.heatFlux.value = flux;
                    material.uniforms.velocityDir.value.copy(velocityDir);
                }
            });

            // Cache windward vertices for particle spawning (update every frame due to tumbling)
            updateCachedWindwardVertices();

            // Update cached heat shield color based on heat flux (for particle spawning)
            const heatLevel = Math.min(flux / PEAK_HEAT_FLUX, 1.0);
            if (heatLevel < 0.3) {
                cachedHeatShieldColor.setRGB(0.5 * heatLevel / 0.3, 0.08 * heatLevel / 0.3, 0.03 * heatLevel / 0.3);
            } else if (heatLevel < 0.6) {
                const t = (heatLevel - 0.3) / 0.3;
                cachedHeatShieldColor.setRGB(0.5 + 0.5 * t, 0.08 + 0.37 * t, 0.03 + 0.09 * t);
            } else {
                const t = (heatLevel - 0.6) / 0.4;
                cachedHeatShieldColor.setRGB(1.0, 0.45 + 0.5 * t, 0.12 + 0.76 * t);
            }
        }

        function updateCachedWindwardVertices() {
            cachedWindwardVertices = [];
            if (allVehicleMeshes.length === 0) return;

            const velocityDir = new THREE.Vector3(1, 0, 0);
            const tempNormal = new THREE.Vector3();
            const tempVertex = new THREE.Vector3();

            allVehicleMeshes.forEach(mesh => {
                if (!mesh.geometry) return;

                const posAttr = mesh.geometry.attributes.position;
                const normAttr = mesh.geometry.attributes.normal;
                if (!posAttr || !normAttr) return;

                mesh.updateMatrixWorld();
                const normalMatrix = new THREE.Matrix3().getNormalMatrix(mesh.matrixWorld);

                // Sample every Nth vertex for performance
                const step = Math.max(1, Math.floor(posAttr.count / 200));

                for (let i = 0; i < posAttr.count; i += step) {
                    tempVertex.fromBufferAttribute(posAttr, i);
                    tempNormal.fromBufferAttribute(normAttr, i);

                    // Transform to world space
                    tempVertex.applyMatrix4(mesh.matrixWorld);
                    tempNormal.applyMatrix3(normalMatrix).normalize();

                    // Check if facing velocity (windward)
                    const dot = tempNormal.dot(velocityDir);
                    if (dot > 0.2) {  // Facing into flow
                        cachedWindwardVertices.push({
                            position: tempVertex.clone(),
                            normal: tempNormal.clone(),
                            windwardFactor: dot
                        });
                    }
                }
            });
        }

        function getWindwardVertices() {
            // For dynamic heating vehicles, find vertices facing the velocity
            if (!currentVehicle || allVehicleMeshes.length === 0) return [];

            const velocityDir = new THREE.Vector3(1, 0, 0);
            const windwardVerts = [];
            const tempNormal = new THREE.Vector3();
            const tempVertex = new THREE.Vector3();

            allVehicleMeshes.forEach(mesh => {
                if (!mesh.geometry) return;

                const posAttr = mesh.geometry.attributes.position;
                const normAttr = mesh.geometry.attributes.normal;
                if (!posAttr || !normAttr) return;

                mesh.updateMatrixWorld();

                for (let i = 0; i < posAttr.count; i++) {
                    tempVertex.fromBufferAttribute(posAttr, i);
                    tempNormal.fromBufferAttribute(normAttr, i);

                    // Transform to world space
                    tempVertex.applyMatrix4(mesh.matrixWorld);
                    tempNormal.transformDirection(mesh.matrixWorld);

                    // Check if facing velocity (windward)
                    const dot = tempNormal.dot(velocityDir);
                    if (dot > 0.1) {  // Facing into flow
                        windwardVerts.push({
                            position: tempVertex.clone(),
                            normal: tempNormal.clone(),
                            windwardFactor: dot
                        });
                    }
                }
            });

            return windwardVerts;
        }

        // Update heat shield appearance and cache color for particle spawning
        function updateHeatShield(flux, dt) {
            // Update shader time
            if (dt) heatShieldTime += dt;

            const color = getHeatColor(flux);
            const intensity = flux < 200 ? 0 : Math.pow(flux / PEAK_HEAT_FLUX, 1.2) * 3;

            heatShieldMeshes.forEach(mesh => {
                // Update shader uniforms if using custom shader
                if (mesh.material.uniforms) {
                    mesh.material.uniforms.time.value = heatShieldTime;
                    mesh.material.uniforms.heatFlux.value = flux;
                }
                // Fallback for standard materials
                else if (mesh.material.emissive) {
                    mesh.material.emissive.copy(color);
                    mesh.material.emissiveIntensity = intensity;

                    if (flux > 1500) {
                        mesh.material.emissiveIntensity *= 1 + (Math.random() - 0.5) * 0.15;
                    }
                }
            });

            // Cache the heat shield color for particle emission
            // This samples the visual appearance of the heat shield material
            cachedHeatShieldColor.copy(color);

            // Update heat glow light
            heatLight.color.copy(color);
            heatLight.intensity = intensity * 0.5;

            // Update UI indicator
            updateHeatIndicator(flux);
        }

        function updateHeatIndicator(flux) {
            const indicator = document.getElementById('heatIndicator');
            const color = getHeatColor(flux);

            let status, bgColor;
            if (flux < 200) {
                status = 'Cold - No heating';
                bgColor = '#1a1a1a';
            } else if (flux < 800) {
                status = 'Light heating';
                bgColor = '#3a1a1a';
            } else if (flux < 1500) {
                status = 'Moderate heating';
                bgColor = '#4a2a00';
            } else if (flux < 2500) {
                status = 'High heating';
                bgColor = '#6a3a00';
            } else if (flux < 3500) {
                status = 'Severe heating';
                bgColor = '#8a4a00';
            } else {
                status = 'EXTREME HEATING';
                bgColor = '#aa5500';
            }

            indicator.textContent = status;
            indicator.style.background = bgColor;
            indicator.style.borderColor = `rgb(${Math.floor(color.r * 255)}, ${Math.floor(color.g * 255)}, ${Math.floor(color.b * 255)})`;
        }

        // ========================================
        // HYPERSONIC WAKE PARTICLE SYSTEM
        // Implements physically believable wake trail behavior
        // ========================================

        /**
         * Particle class for hypersonic wake simulation
         *
         * Key behaviors:
         * - Spawns with exact heat shield color (sampled from material)
         * - Lifetime-based color transition to neutral grey
         * - Exponential velocity decay (downstream lag effect)
         * - Non-emissive smoke appearance (no glowing orbs)
         */
        class Particle {
            constructor() {
                // Position and motion state
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.initialVelocity = new THREE.Vector3(); // Stored for decay calculations
                this.initialSpeed = 0; // For percentage-based velocity tracking

                // Lifetime tracking
                this.age = 0;
                this.maxAge = 0;

                // Visual properties
                this.color = new THREE.Color();
                this.spawnColor = new THREE.Color(); // Exact heat shield color at spawn
                this.baseSize = 0; // Initial size for growth calculations
                this.currentSize = 0;
                this.alpha = 0;
                this.brightness = 1.0; // Emissive brightness multiplier
                this.stretch = 1.0; // Velocity-aligned stretch factor

                // State
                this.active = false;

                // Turbulence accumulator for smooth noise
                this.turbulenceOffset = new THREE.Vector3();
                this.noisePhase = 0; // For procedural noise
            }

            /**
             * Reset particle for reuse from object pool
             * @param {THREE.Vector3} position - Spawn position (world space)
             * @param {THREE.Vector3} velocity - Initial velocity (matches vehicle velocity direction)
             * @param {number} maxAge - Particle lifetime in seconds
             * @param {THREE.Color} heatShieldColor - Sampled from heat shield material
             * @param {number} baseSize - Initial particle size
             */
            reset(position, velocity, maxAge, heatShieldColor, baseSize) {
                this.position.copy(position);
                this.velocity.copy(velocity);
                this.initialVelocity.copy(velocity);
                this.initialSpeed = velocity.length();

                this.age = 0;
                this.maxAge = maxAge;

                // SPAWN COLOR: Exact match to heat shield material color
                this.color.copy(heatShieldColor);
                this.spawnColor.copy(heatShieldColor);

                this.baseSize = baseSize;
                this.currentSize = baseSize;
                this.alpha = 0; // Starts at 0 for fade-in
                this.brightness = 6.0; // Maximum intensity at spawn - plasma formation
                this.stretch = 2.5; // Initial velocity-aligned stretch

                this.active = true;
                this.turbulenceOffset.set(0, 0, 0);
                this.noisePhase = Math.random() * 100; // Random phase for varied turbulence
            }

            /**
             * Update particle state for current frame
             * Implements 4-stage plasma wake model:
             * - Stage A (0-15%): Plasma formation - max brightness
             * - Stage B (15-45%): Cooling plasma - reducing emissive
             * - Stage C (45-75%): Early smoke - no emissive
             * - Stage D (75-100%): Dissipating wake - opacity fade
             *
             * @param {number} dt - Delta time in seconds
             */
            update(dt) {
                this.age += dt;

                // Check lifetime expiration
                if (this.age >= this.maxAge) {
                    this.active = false;
                    return;
                }

                // Normalized lifetime (0.0 to 1.0)
                const t = this.age / this.maxAge;

                // ========================================
                // VELOCITY DECAY (Hypersonic Wake Lag)
                // ========================================
                const decayRate = 1.8;
                const velocityFactor = Math.exp(-decayRate * t);
                this.velocity.copy(this.initialVelocity).multiplyScalar(velocityFactor);

                // ========================================
                // TURBULENCE (Billowing Smoke Diffusion)
                // ========================================
                // Increased lateral diffusion over time for smoke billowing
                this.noisePhase += dt * 2.5;

                // Amplitude increases significantly as soot cools and diffuses
                const noiseAmplitude = smoothstep(0.2, 0.9, t) * 3.0;

                // Multi-frequency noise for natural billowing motion
                const noiseY = (Math.sin(this.noisePhase * 1.3) + Math.sin(this.noisePhase * 2.7) * 0.3) * noiseAmplitude * dt;
                const noiseZ = (Math.cos(this.noisePhase * 0.9) + Math.cos(this.noisePhase * 2.1) * 0.3) * noiseAmplitude * dt;

                this.turbulenceOffset.set(0, noiseY, noiseZ);
                this.position.add(this.turbulenceOffset);

                // Update position
                this.position.addScaledVector(this.velocity, dt);

                // ========================================
                // BRIGHTNESS (Soot Layer - Moderate, Not Glowing)
                // ========================================
                // Soot starts moderate brightness, fades to dim
                if (t < 0.10) {
                    // Initial moderate brightness
                    this.brightness = 2.5;
                } else if (t < 0.40) {
                    // Gradual reduction
                    const stageT = (t - 0.10) / 0.30;
                    this.brightness = 2.5 - stageT * 1.0; // 2.5 → 1.5
                } else if (t < 0.70) {
                    // Low brightness smoke
                    const stageT = (t - 0.40) / 0.30;
                    this.brightness = 1.5 - stageT * 0.5; // 1.5 → 1.0
                } else {
                    // Dim dissipating smoke
                    this.brightness = 1.0;
                }

                // ========================================
                // COLOR INTERPOLATION (Soot Layer Gradient)
                // ========================================
                // Heat Shield → Burnt Orange → Brown → Grey → Dark Grey
                // This is the SOOT layer - cooler colors than plasma

                if (t < 0.15) {
                    // Initial heat shield color
                    this.color.copy(this.spawnColor);
                } else if (t < 0.30) {
                    // Heat shield → Burnt orange
                    const blendT = (t - 0.15) / 0.15;
                    this.color.copy(this.spawnColor).lerp(SOOT_BURNT_ORANGE, blendT);
                } else if (t < 0.50) {
                    // Burnt orange → Brown
                    const blendT = (t - 0.30) / 0.20;
                    this.color.copy(SOOT_BURNT_ORANGE).lerp(SOOT_BROWN, blendT);
                } else if (t < 0.70) {
                    // Brown → Neutral grey
                    const blendT = (t - 0.50) / 0.20;
                    this.color.copy(SOOT_BROWN).lerp(SMOKE_GREY, blendT);
                } else {
                    // Grey → Dark grey fade
                    const blendT = (t - 0.70) / 0.30;
                    this.color.copy(SMOKE_GREY).lerp(SOOT_DARK_GREY, blendT);
                }

                // ========================================
                // OPACITY CURVE
                // ========================================
                // 0-10%: Rapid fade in
                // 10-60%: High opacity
                // 60-100%: Exponential fade out

                if (t < 0.10) {
                    // Rapid fade in
                    this.alpha = (t / 0.10) * 0.95;
                } else if (t < 0.60) {
                    // Maintain high opacity
                    this.alpha = 0.95;
                } else {
                    // Exponential fade out
                    const fadeT = (t - 0.60) / 0.40;
                    this.alpha = 0.95 * Math.exp(-3.0 * fadeT);
                }

                // ========================================
                // SPRITE STRETCH (Velocity-Aligned)
                // ========================================
                // Elongated during early lifetime, reduces over time
                if (t < 0.15) {
                    // Maximum stretch during plasma formation
                    this.stretch = 2.5;
                } else if (t < 0.45) {
                    // Gradual reduction during cooling
                    const stretchT = (t - 0.15) / 0.30;
                    this.stretch = 2.5 - stretchT * 1.0; // 2.5 → 1.5
                } else {
                    // Minimal stretch for smoke phase
                    const stretchT = (t - 0.45) / 0.55;
                    this.stretch = 1.5 - stretchT * 0.5; // 1.5 → 1.0
                }

                // ========================================
                // SIZE GROWTH (Billowing Smoke Expansion)
                // ========================================
                // Soot grows 2-4x over lifetime for billowing effect

                if (t < 0.30) {
                    // Initial moderate expansion
                    this.currentSize = this.baseSize * (1.0 + t * 2.0);
                } else if (t < 0.60) {
                    // Accelerating expansion
                    const expandT = (t - 0.30) / 0.30;
                    this.currentSize = this.baseSize * (1.6 + expandT * 1.5);
                } else {
                    // Full billowing smoke
                    const expandT = (t - 0.60) / 0.40;
                    this.currentSize = this.baseSize * (3.1 + expandT * 1.5);
                }

                // ========================================
                // CLEANUP CHECK
                // ========================================
                if (this.alpha < 0.01) {
                    this.active = false;
                }
            }
        }

        /**
         * Particle emitter for hypersonic wake trail
         *
         * Features:
         * - Object pooling for GPU efficiency
         * - Samples heat shield color at emission time
         * - Non-emissive smoke shader (no bloom/glow)
         * - Soft volumetric smoke sprite texture
         */
        class ParticleEmitter {
            constructor(maxParticles = 5000) {
                this.maxParticles = maxParticles;
                this.particles = [];
                this.accumulator = 0;

                // Pre-allocate particle pool (no runtime allocations)
                for (let i = 0; i < maxParticles; i++) {
                    this.particles.push(new Particle());
                }

                this.createGeometry();
            }

            /**
             * Create GPU buffers and shader material
             * Supports brightness-modulated colors and velocity-aligned stretching
             */
            createGeometry() {
                const geometry = new THREE.BufferGeometry();

                // Pre-allocate typed arrays for GPU buffers
                const positions = new Float32Array(this.maxParticles * 3);
                const colors = new Float32Array(this.maxParticles * 3);
                const sizes = new Float32Array(this.maxParticles);
                const alphas = new Float32Array(this.maxParticles);
                const stretches = new Float32Array(this.maxParticles);

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
                geometry.setAttribute('stretch', new THREE.BufferAttribute(stretches, 1));

                // Plasma wake shader with brightness and stretch support
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        pointTexture: { value: this.createSmokeTexture() }
                    },
                    vertexShader: `
                        attribute float size;
                        attribute float alpha;
                        attribute float stretch;
                        attribute vec3 color;

                        varying vec3 vColor;
                        varying float vAlpha;
                        varying float vStretch;

                        void main() {
                            vColor = color;
                            vAlpha = alpha;
                            vStretch = stretch;

                            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

                            // Size with stretch factor applied
                            gl_PointSize = size * stretch * (280.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D pointTexture;

                        varying vec3 vColor;
                        varying float vAlpha;
                        varying float vStretch;

                        void main() {
                            // Stretch UV coordinates for elongated appearance
                            vec2 uv = gl_PointCoord;

                            // Elongate along X axis (flow direction in screen space)
                            uv.x = (uv.x - 0.5) / max(vStretch * 0.5, 0.5) + 0.5;

                            // Clamp to valid range
                            if (uv.x < 0.0 || uv.x > 1.0) discard;

                            vec4 tex = texture2D(pointTexture, uv);

                            // Output with color (already brightness-modulated)
                            gl_FragColor = vec4(vColor, vAlpha * tex.a);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    depthTest: true
                });

                this.mesh = new THREE.Points(geometry, material);
                scene.add(this.mesh);
            }

            /**
             * Create plasma/smoke sprite texture
             * Bright core for plasma phase, soft falloff for smoke phase
             */
            createSmokeTexture() {
                const canvas = document.createElement('canvas');
                const size = 128;
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                const center = size / 2;
                const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);

                // Bright core, gradual falloff for plasma/smoke hybrid appearance
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');    // Bright core
                gradient.addColorStop(0.15, 'rgba(255, 255, 255, 0.9)'); // Still bright
                gradient.addColorStop(0.35, 'rgba(255, 255, 255, 0.5)'); // Transition
                gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.2)');  // Soft edge
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');      // Fade out

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);

                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                return texture;
            }

            /**
             * Emit a single particle from heat shield vertex
             * @param {number} flux - Current heat flux value
             */
            emit(flux) {
                // Check if we have spawn points (regular heat shield or dynamic windward)
                const hasDynamicHeating = currentVehicleConfig && currentVehicleConfig.dynamicHeatShield;
                const hasSpawnPoints = heatShieldVertices.length > 0 ||
                    (hasDynamicHeating && cachedWindwardVertices.length > 0);

                if (flux < SPAWN_HEAT_THRESHOLD || !hasSpawnPoints) return;

                // Find inactive particle from pool (no allocation)
                let particle = null;
                for (let i = 0; i < this.maxParticles; i++) {
                    if (!this.particles[i].active) {
                        particle = this.particles[i];
                        break;
                    }
                }
                if (!particle) return; // Pool exhausted

                // Pick random vertex from heat shield mesh or windward vertices
                let spawnPos;
                if (hasDynamicHeating && cachedWindwardVertices.length > 0) {
                    // Use cached windward vertices for dynamic heating
                    const windwardVert = cachedWindwardVertices[
                        Math.floor(Math.random() * cachedWindwardVertices.length)
                    ];
                    spawnPos = windwardVert.position.clone();
                } else {
                    // Use regular heat shield vertices
                    const vertexLocal = heatShieldVertices[
                        Math.floor(Math.random() * heatShieldVertices.length)
                    ].clone();
                    // Transform to world space using heat shield mesh matrix
                    if (heatShieldMeshes.length > 0) {
                        vertexLocal.applyMatrix4(heatShieldMeshes[0].matrixWorld);
                    }
                    spawnPos = vertexLocal;
                }

                // Minimal offset - keep particles tight to heat shield surface
                spawnPos.x += (Math.random() - 0.5) * 0.1;
                spawnPos.y += (Math.random() - 0.5) * 0.1;
                spawnPos.z += (Math.random() - 0.5) * 0.1;

                // VELOCITY: Straight back from heat shield - coherent plasma stream
                // Minimal lateral spread for tight, directional trail
                const baseSpeed = 25 + Math.random() * 10;
                const velocity = new THREE.Vector3(
                    -baseSpeed,  // Straight back from heat shield
                    (Math.random() - 0.5) * 0.5,  // Minimal Y spread
                    (Math.random() - 0.5) * 0.5   // Minimal Z spread
                );

                // SPAWN COLOR: Sample directly from cached heat shield material color
                // This ensures exact match to vehicle heat shield appearance
                const spawnColor = cachedHeatShieldColor.clone();

                // Size varies with heat flux (more heat = larger particles)
                const heatNorm = flux / PEAK_HEAT_FLUX;
                const baseSize = 0.5 + Math.random() * 0.3 + heatNorm * 0.3;

                // Lifetime varies for natural trail appearance
                // Longer lifetime allows particles to travel much farther
                const maxAge = (4 + Math.random() * 3) * trailLengthMultiplier;

                particle.reset(spawnPos, velocity, maxAge, spawnColor, baseSize);
            }

            /**
             * Update emitter and all particles
             * @param {number} dt - Delta time in seconds
             * @param {number} flux - Current heat flux value
             * @returns {number} Active particle count
             */
            update(dt, flux) {
                // Calculate spawn rate based on heat flux
                // Higher spawn rate for denser, more intense trail
                let spawnRate = 0;
                if (flux >= SPAWN_HEAT_THRESHOLD) {
                    const normalized = (flux - SPAWN_HEAT_THRESHOLD) / (PEAK_HEAT_FLUX - SPAWN_HEAT_THRESHOLD);
                    spawnRate = 150 + normalized * 450; // 150-600 particles per second
                }

                // Accumulate and emit particles
                this.accumulator += spawnRate * dt;
                while (this.accumulator >= 1) {
                    this.emit(flux);
                    this.accumulator -= 1;
                }

                // Update all active particles
                let activeCount = 0;
                for (let i = 0; i < this.maxParticles; i++) {
                    if (this.particles[i].active) {
                        this.particles[i].update(dt);
                        activeCount++;
                    }
                }

                // Update GPU buffers
                this.updateBuffers();
                return activeCount;
            }

            /**
             * Update GPU buffers with current particle state
             * Includes position, color (brightness-modulated), size, alpha, and stretch
             */
            updateBuffers() {
                const geo = this.mesh.geometry;
                const positions = geo.attributes.position.array;
                const colors = geo.attributes.color.array;
                const sizes = geo.attributes.size.array;
                const alphas = geo.attributes.alpha.array;
                const stretches = geo.attributes.stretch.array;

                let idx = 0;
                for (let i = 0; i < this.maxParticles; i++) {
                    const p = this.particles[i];
                    if (p.active) {
                        // Position
                        positions[idx * 3] = p.position.x;
                        positions[idx * 3 + 1] = p.position.y;
                        positions[idx * 3 + 2] = p.position.z;

                        // Color with brightness multiplier (pre-multiplied for shader)
                        colors[idx * 3] = p.color.r * p.brightness;
                        colors[idx * 3 + 1] = p.color.g * p.brightness;
                        colors[idx * 3 + 2] = p.color.b * p.brightness;

                        // Size, alpha, and velocity-aligned stretch
                        sizes[idx] = p.currentSize;
                        alphas[idx] = p.alpha;
                        stretches[idx] = p.stretch;
                        idx++;
                    }
                }

                // Zero out unused buffer entries
                for (let i = idx; i < this.maxParticles; i++) {
                    sizes[i] = 0;
                    alphas[i] = 0;
                    stretches[i] = 1;
                }

                // Mark buffers for GPU upload
                geo.attributes.position.needsUpdate = true;
                geo.attributes.color.needsUpdate = true;
                geo.attributes.size.needsUpdate = true;
                geo.attributes.alpha.needsUpdate = true;
                geo.attributes.stretch.needsUpdate = true;
            }

            /**
             * Clear all particles (used when switching vehicles)
             */
            clear() {
                for (let i = 0; i < this.maxParticles; i++) {
                    this.particles[i].active = false;
                }
                this.accumulator = 0;
                this.updateBuffers();
            }
        }

        const emitter = new ParticleEmitter(5000);

        // ========================================
        // BODY-FIXED COORDINATE AXES
        // ========================================
        let bodyAxes = null;

        /**
         * Create body-fixed coordinate axes visualization
         * Red = X axis, Green = Y axis, Blue = Z axis
         * Attached to vehicle so it rotates with bank/pitch
         */
        function createBodyAxes(axisLength = 3.0) {
            const axesGroup = new THREE.Group();
            axesGroup.name = 'bodyAxes';

            // Scale thickness proportionally to axis length
            const shaftRadius = axisLength * 0.0055;
            const coneRadius = axisLength * 0.015;
            const coneHeight = axisLength * 0.045;
            const shaftLength = axisLength - coneHeight;

            // Materials for each axis
            const xMaterial = new THREE.MeshBasicMaterial({ color: 0xff3333 }); // Red
            const yMaterial = new THREE.MeshBasicMaterial({ color: 0x33ff33 }); // Green
            const zMaterial = new THREE.MeshBasicMaterial({ color: 0x3388ff }); // Blue

            // Shaft geometry (cylinder)
            const shaftGeometry = new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 8);

            // Cone geometry (arrowhead)
            const coneGeometry = new THREE.ConeGeometry(coneRadius, coneHeight, 12);

            // X Axis (Red) - points along +X
            const xShaft = new THREE.Mesh(shaftGeometry, xMaterial);
            xShaft.rotation.z = -Math.PI / 2; // Rotate cylinder to point along X
            xShaft.position.x = shaftLength / 2;

            const xCone = new THREE.Mesh(coneGeometry, xMaterial);
            xCone.rotation.z = -Math.PI / 2;
            xCone.position.x = shaftLength + coneHeight / 2;

            const xAxis = new THREE.Group();
            xAxis.add(xShaft);
            xAxis.add(xCone);
            axesGroup.add(xAxis);

            // Y Axis (Green) - points along +Y
            const yShaft = new THREE.Mesh(shaftGeometry, yMaterial);
            yShaft.position.y = shaftLength / 2;

            const yCone = new THREE.Mesh(coneGeometry, yMaterial);
            yCone.position.y = shaftLength + coneHeight / 2;

            const yAxis = new THREE.Group();
            yAxis.add(yShaft);
            yAxis.add(yCone);
            axesGroup.add(yAxis);

            // Z Axis (Blue) - points along +Z
            const zShaft = new THREE.Mesh(shaftGeometry, zMaterial);
            zShaft.rotation.x = Math.PI / 2; // Rotate cylinder to point along Z
            zShaft.position.z = shaftLength / 2;

            const zCone = new THREE.Mesh(coneGeometry, zMaterial);
            zCone.rotation.x = Math.PI / 2;
            zCone.position.z = shaftLength + coneHeight / 2;

            const zAxis = new THREE.Group();
            zAxis.add(zShaft);
            zAxis.add(zCone);
            axesGroup.add(zAxis);

            return axesGroup;
        }

        /**
         * Create world-fixed wind axes for uncontrolled reentry
         * Shows velocity direction (+X = red/orange), vertical (+Y = green), lateral (+Z = blue)
         * Not attached to vehicle - stays fixed in world space
         */
        function createWindAxes(axisLength = 48.0) {
            const axesGroup = new THREE.Group();
            axesGroup.name = 'windAxes';

            // Scale thickness proportionally to axis length
            const shaftRadius = axisLength * 0.0055;
            const coneRadius = axisLength * 0.015;
            const coneHeight = axisLength * 0.045;
            const shaftLength = axisLength - coneHeight;

            // Materials - velocity axis is orange to distinguish from body axes
            const velMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 }); // Orange (velocity)
            const upMaterial = new THREE.MeshBasicMaterial({ color: 0x33ff33 });  // Green (up)
            const latMaterial = new THREE.MeshBasicMaterial({ color: 0x3388ff }); // Blue (lateral)

            const shaftGeometry = new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 8);
            const coneGeometry = new THREE.ConeGeometry(coneRadius, coneHeight, 12);

            // Velocity Axis (Orange) - points along +X (flow direction)
            const velShaft = new THREE.Mesh(shaftGeometry, velMaterial);
            velShaft.rotation.z = -Math.PI / 2;
            velShaft.position.x = shaftLength / 2;

            const velCone = new THREE.Mesh(coneGeometry, velMaterial);
            velCone.rotation.z = -Math.PI / 2;
            velCone.position.x = shaftLength + coneHeight / 2;

            const velAxis = new THREE.Group();
            velAxis.add(velShaft);
            velAxis.add(velCone);
            axesGroup.add(velAxis);

            // Up Axis (Green) - points along +Y
            const upShaft = new THREE.Mesh(shaftGeometry, upMaterial);
            upShaft.position.y = shaftLength / 2;

            const upCone = new THREE.Mesh(coneGeometry, upMaterial);
            upCone.position.y = shaftLength + coneHeight / 2;

            const upAxis = new THREE.Group();
            upAxis.add(upShaft);
            upAxis.add(upCone);
            axesGroup.add(upAxis);

            // Lateral Axis (Blue) - points along +Z
            const latShaft = new THREE.Mesh(shaftGeometry, latMaterial);
            latShaft.rotation.x = Math.PI / 2;
            latShaft.position.z = shaftLength / 2;

            const latCone = new THREE.Mesh(coneGeometry, latMaterial);
            latCone.rotation.x = Math.PI / 2;
            latCone.position.z = shaftLength + coneHeight / 2;

            const latAxis = new THREE.Group();
            latAxis.add(latShaft);
            latAxis.add(latCone);
            axesGroup.add(latAxis);

            return axesGroup;
        }

        // ========================================
        // VEHICLE LOADING
        // ========================================
        const loader = new GLTFLoader();

        // Keywords to identify heat shield meshes
        const heatShieldKeywords = ['heat', 'shield', 'thermal', 'ablat', 'tps', 'tile', 'heatshield'];

        function isHeatShieldMesh(name, vehicleConfig) {
            if (vehicleConfig && vehicleConfig.heatShieldMeshes) {
                if (vehicleConfig.heatShieldMeshes.some(n => name.toLowerCase().includes(n.toLowerCase()))) {
                    return true;
                }
            }
            const lowerName = name.toLowerCase();
            return heatShieldKeywords.some(keyword => lowerName.includes(keyword));
        }

        function loadVehicle(vehicleNum) {
            const config = vehicles[vehicleNum];
            if (!config) return;

            currentVehicleConfig = config;
            emitter.clear();
            plasmaEmitter.clear();
            if (shockHalo) shockHalo.visible = false;

            // Reset bow shock state for new vehicle
            shieldCenter.set(0, 0, 0);
            shieldNormal.set(-1, 0, 0);  // Points upstream
            smoothedShieldCenter.set(0, 0, 0);
            smoothedShieldNormal.set(-1, 0, 0);  // Points upstream
            smoothedRadius = 2.0;
            maxShieldRadius = 2.0;

            // Clear bow shock geometry
            if (shockHaloGeometry) {
                shockHaloGeometry.dispose();
                shockHaloGeometry = new THREE.BufferGeometry();
                if (shockHalo) shockHalo.geometry = shockHaloGeometry;
            }

            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            loading.textContent = `Loading ${config.name}...`;

            document.querySelectorAll('.vehicle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.vehicle === String(vehicleNum));
            });

            loader.load(
                './' + config.filename,
                (gltf) => {
                    if (currentVehicle) {
                        scene.remove(currentVehicle);
                        originalMaterials.clear();
                        heatShieldMeshes = [];
                        heatShieldVertices = [];
                        allVehicleMeshes = [];
                        dynamicHeatMaterials.clear();
                    }

                    currentVehicle = gltf.scene;

                    // Center and scale
                    const box = new THREE.Box3().setFromObject(currentVehicle);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 4 / maxDim;

                    currentVehicle.scale.multiplyScalar(scale);
                    currentVehicle.position.sub(center.multiplyScalar(scale));

                    // Find heat shield meshes and collect vertices
                    currentVehicle.traverse((child) => {
                        if (child.isMesh) {
                            const isHeatShield = isHeatShieldMesh(child.name, config);

                            originalMaterials.set(child, child.material.clone());

                            if (isHeatShield) {
                                // Create heat-reactive material
                                const heatMat = createHeatShieldMaterial();
                                child.material = heatMat;
                                heatShieldMeshes.push(child);

                                // Collect vertices for particle spawning
                                const positions = child.geometry.attributes.position;
                                for (let i = 0; i < positions.count; i++) {
                                    heatShieldVertices.push(new THREE.Vector3(
                                        positions.getX(i),
                                        positions.getY(i),
                                        positions.getZ(i)
                                    ));
                                }

                                console.log(`Heat shield: ${child.name} (${positions.count} vertices)`);
                            }
                        }
                    });

                    scene.add(currentVehicle);

                    // Add coordinate axes
                    // For controlled vehicles: body-fixed axes (rotate with vehicle)
                    // For uncontrolled (tumbling): world-fixed wind axes
                    if (bodyAxes) {
                        bodyAxes.parent?.remove(bodyAxes);
                    }
                    if (windAxes) {
                        scene.remove(windAxes);
                        windAxes = null;
                    }

                    if (config.isTumbling) {
                        // Uncontrolled reentry - add world-fixed wind axes
                        // Size axes to 0.28x the max dimension
                        const axisLength = maxDim * scale * 0.28;
                        windAxes = createWindAxes(axisLength);
                        windAxes.position.set(0, 0, 0);
                        scene.add(windAxes);  // Add to scene, not vehicle
                        // Also add small body axes to show vehicle orientation
                        bodyAxes = createBodyAxes(axisLength * 0.4);  // Smaller body axes
                        bodyAxes.position.set(0, 0, 0);
                        currentVehicle.add(bodyAxes);
                    } else {
                        // Controlled vehicle - body-fixed axes only
                        // Custom axis sizes for specific vehicles
                        let axesSize = 48.0;
                        const nameLower = config.name.toLowerCase();
                        if (nameLower.includes('shuttle') || nameLower.includes('orbiter')) {
                            axesSize = 100.8;
                        } else if (nameLower.includes('x-37') || nameLower.includes('x37')) {
                            axesSize = 192.0;
                        }
                        bodyAxes = createBodyAxes(axesSize);
                        bodyAxes.position.set(0, 0, 0);
                        currentVehicle.add(bodyAxes);
                    }

                    loading.style.display = 'none';

                    // Setup dynamic heating for tumbling vehicles (like school bus)
                    if (config.dynamicHeatShield) {
                        setupDynamicHeating();
                        console.log(`Dynamic heating enabled for ${config.name} with ${allVehicleMeshes.length} meshes`);
                    }

                    // Initialize tumbling for uncontrolled reentry vehicles
                    if (config.isTumbling) {
                        initTumbleState();
                        console.log(`Tumbling enabled for ${config.name}`);
                    }

                    // Update heat shield status
                    document.getElementById('heatShieldStatus').textContent =
                        heatShieldMeshes.length > 0 ? `${heatShieldMeshes.length} mesh(es)` :
                        (config.dynamicHeatShield ? `${allVehicleMeshes.length} dynamic` : 'Not found');

                    // Apply current heat flux
                    updateHeatShield(heatFlux);
                    if (config.dynamicHeatShield) {
                        updateDynamicHeating(heatFlux, 0);
                    }

                    console.log(`Loaded ${config.name} with ${heatShieldVertices.length} heat shield vertices`);
                },
                (xhr) => {
                    const percent = Math.round(xhr.loaded / xhr.total * 100);
                    loading.textContent = `Loading ${config.name}... ${percent}%`;
                },
                (error) => {
                    console.error('Error loading model:', error);
                    loading.textContent = `Error loading ${config.name}`;
                    loading.style.color = '#ff6666';
                }
            );
        }

        // ========================================
        // EVENT LISTENERS
        // ========================================
        document.querySelectorAll('.vehicle-btn').forEach(btn => {
            btn.addEventListener('click', () => loadVehicle(parseInt(btn.dataset.vehicle)));
        });

        document.getElementById('heatFluxSlider').addEventListener('input', (e) => {
            heatFlux = parseFloat(e.target.value);
            document.getElementById('heatFluxValue').textContent = heatFlux;
            updateHeatShield(heatFlux);
        });

        document.getElementById('trailLengthSlider').addEventListener('input', (e) => {
            trailLengthMultiplier = parseFloat(e.target.value);
            document.getElementById('trailLengthValue').textContent = trailLengthMultiplier.toFixed(1);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') loadVehicle(1);
            if (e.key === '2') loadVehicle(2);
            if (e.key === '3') loadVehicle(3);
            if (e.key === '4') loadVehicle(4);
            if (e.key === '5') loadVehicle(5);
            if (e.key === '6') loadVehicle(6);
            if (e.key === '7') loadVehicle(7);
            // Toggle debug visualization with 'D' key
            if (e.key === 'd' || e.key === 'D') {
                DEBUG_BOW_SHOCK = !DEBUG_BOW_SHOCK;
                if (debugGroup) debugGroup.visible = DEBUG_BOW_SHOCK;
                console.log('Bow shock debug:', DEBUG_BOW_SHOCK ? 'ON' : 'OFF');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ========================================
        // ANIMATION LOOP
        // ========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); // Cap delta time

            // ========================================
            // Update Tumbling Motion (for uncontrolled reentry)
            // ========================================
            updateTumble(dt);

            // ========================================
            // Update Heat Shield Charring Animation
            // ========================================
            updateHeatShield(heatFlux, dt);

            // ========================================
            // Update Dynamic Windward Heating (School Bus)
            // ========================================
            if (currentVehicleConfig && currentVehicleConfig.dynamicHeatShield) {
                updateDynamicHeating(heatFlux, dt);
            }

            // ========================================
            // LAYER 1: Update Shock Halo
            // ========================================
            updateShockHalo(heatFlux, dt);

            // ========================================
            // LAYER 2: Update Plasma Wake
            // ========================================
            const plasmaCount = plasmaEmitter.update(dt, heatFlux);

            // ========================================
            // LAYER 3: Update Soot Trail
            // ========================================
            const sootCount = emitter.update(dt, heatFlux);

            // Update particle count display (combined)
            document.getElementById('particleCount').textContent = plasmaCount + sootCount;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Load first vehicle
        loadVehicle(1);
    </script>
</body>
</html>
