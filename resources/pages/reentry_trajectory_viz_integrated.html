                    case ']':
                        e.preventDefault();
                        if (cameraState.mode === 'trajectory') {
                            cameraState.trajectoryIndex = Math.min(trajectory.length - 1, cameraState.trajectoryIndex + 10);
                            updateTrajectoryPivot();
                            console.log(`Pivot at trajectory point ${cameraState.trajectoryIndex}/${trajectory.length}`);
                        }
                        break;
                    case ' ':
                        e.preventDefault();
                        // Toggle play/pause (same as clicking the Play button)
                        document.getElementById('play-btn').click();
                        break;
                }
            });

            // Collapsible info panel toggle
            document.getElementById('info-toggle').addEventListener('click', function() {
                const content = document.getElementById('info-content');
                const arrow = document.getElementById('toggle-arrow');
                content.classList.toggle('collapsed');
                arrow.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
            });

            // Button controls
            document.getElementById('play-btn').addEventListener('click', function() {
                animating = !animating;
                this.textContent = animating ? '⏸ Pause' : '▶ Play Animation';
                this.classList.toggle('active');

                // Sync vehicle viewer playback state
                if (window.VehicleViewer) {
                    window.VehicleViewer.setPlaybackState(animating);
                }

                if (animating) {
                    // Reset real-time clock when starting animation
                    lastRealTime = performance.now();
                    
                    if (!animationMarker) {
                        const markerGeom = new THREE.SphereGeometry(50, 16, 16);
                        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
                        animationMarker = new THREE.Mesh(markerGeom, markerMat);
                        scene.add(animationMarker);
                    }
                }
                
                // Reset peak needles when animation starts
                if (animating) {
                    peakGaugeValue = 0;
                    updatePeakNeedle(0);
                    peakDecelValue = 0;
                    updateDecelPeakNeedle(0);
                }
            });

            // REMOVED: Reset button functionality (button deleted from UI)
            /*
            document.getElementById('reset-btn').addEventListener('click', () => {
                // Reset to global mode with default view
                setCameraMode('global');
                cameraState.radius = 18027.75; // original distance
                cameraState.yaw = Math.atan2(15000, 15000); // original azimuth
                cameraState.pitch = Math.acos(10000 / 18027.75); // original elevation
                updateCameraFromSpherical();
                
                animating = false;
                animationProgress = 0;
                simulationTime = 0; // Reset simulation clock
                lastRealTime = performance.now(); // Reset real-time reference
                document.getElementById('play-btn').textContent = '▶ Play Animation';
                document.getElementById('play-btn').classList.remove('active');
            });
            */

            // REMOVED: Ground track toggle button functionality (button deleted from UI)
            /*
            document.getElementById('toggle-ground').addEventListener('click', function() {
            /*
            document.getElementById('toggle-ground').addEventListener('click', function() {
                showGroundTrack = !showGroundTrack;
                this.classList.toggle('active');
                
                if (showGroundTrack && !groundTrack) {
                    const groundPoints = [];
                    for (let point of trajectory) {
                        const groundPoint = latLonToCartesian(point.lat, point.lon, EARTH_RADIUS + 5);
                        groundPoints.push(groundPoint.x, groundPoint.y, groundPoint.z);
                    }
                    const groundGeom = new THREE.BufferGeometry();
                    groundGeom.setAttribute('position', new THREE.Float32BufferAttribute(groundPoints, 3));
                    const groundMat = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 });
                    groundTrack = new THREE.Line(groundGeom, groundMat);
                    scene.add(groundTrack);
                } else if (groundTrack) {
                    groundTrack.visible = showGroundTrack;
                }
            });
            */
            
            // Camera mode buttons
            document.getElementById('mode-global').addEventListener('click', function() {
                setCameraMode('global');
                document.getElementById('mode-global').classList.add('active');
                document.getElementById('mode-trajectory').classList.remove('active');
            });
            
            document.getElementById('mode-trajectory').addEventListener('click', function() {
                setCameraMode('trajectory');
                document.getElementById('mode-trajectory').classList.add('active');
                document.getElementById('mode-global').classList.remove('active');
            });
            
            document.getElementById('vehicle-lock-btn').addEventListener('click', function() {
                if (cameraState.mode === 'trajectory') {
                    cameraState.vehicleLocked = !cameraState.vehicleLocked;
                    this.classList.toggle('active');
                    console.log(`Vehicle lock: ${cameraState.vehicleLocked ? 'ON' : 'OFF'}`);
                    
                    // Hide pivot indicator when locked, show when unlocked
                    pivotIndicator.visible = !cameraState.vehicleLocked;
                }
            });

            // === TIME WARP SYSTEM ===
            // Extended warp levels: 1×, 2×, 5×, 10×, 25×, 50×, 75×, 100×, 150×
            let warpLevel = 0; // 0-8, default is real time
            const warpScales = [1.0, 2.0, 5.0, 10.0, 25.0, 50.0, 75.0, 100.0, 150.0];
            const maxWarpLevel = warpScales.length - 1;
            let playbackTimeScale = warpScales[warpLevel];
            
            // === HIGH-WARP STABILITY: SUB-STEPPING ===
            // Maximum safe simulation step to prevent physics instability
            const MAX_SIMULATION_STEP = 0.05; // 50ms max per physics update
            
            // === REAL-TIME CLOCK SYSTEM ===
            let lastRealTime = performance.now(); // High precision wall-clock time in milliseconds
            let simulationTime = 0; // Cumulative simulation time in seconds
            
            // Calculate trajectory duration (for proper real-time scaling)
            // Assuming trajectory represents ~1500 seconds of flight time
            const trajectoryDurationSeconds = 1500; // Adjust based on actual trajectory
            
            function updateWarpLevel(delta) {
                warpLevel = Math.max(0, Math.min(maxWarpLevel, warpLevel + delta));
                playbackTimeScale = warpScales[warpLevel];
                updateWarpIndicator();
                console.log(`[TIME WARP] Level ${warpLevel}, Speed ${playbackTimeScale}x`);
            }
            
            function updateWarpIndicator() {
                const indicator = document.getElementById('warp-indicator');
                // Always show indicator
                if (warpLevel === 0) {
                    // Show x1 for normal speed
                    indicator.innerHTML = `TIME<br>x1`;
                } else {
                    // Cap arrows at 4 for high warp levels (to avoid UI clutter)
                    const numArrows = Math.min(warpLevel, 4);
                    const arrows = '▶'.repeat(numArrows);
                    const multiplier = `x${warpScales[warpLevel]}`;
                    // Add "MAX" indicator for highest warp
                    const maxLabel = warpLevel === maxWarpLevel ? ' MAX' : '';
                    indicator.innerHTML = `TIME ${arrows}<br>${multiplier}${maxLabel}`;
                }
            }
            // === END TIME WARP SYSTEM ===

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                // === REAL-TIME DELTA CALCULATION (Frame-rate independent) ===
                const currentRealTime = performance.now(); // Current wall-clock time in milliseconds
                const realDeltaMs = currentRealTime - lastRealTime; // Elapsed real time since last frame
                const realDeltaSeconds = realDeltaMs / 1000.0; // Convert to seconds
                lastRealTime = currentRealTime; // Update for next frame
                
                // === SIMULATION TIME PROGRESSION WITH SUB-STEPPING ===
                // Apply time warp factor to real delta
                let simulationDeltaSeconds = realDeltaSeconds * playbackTimeScale;
                
                // === HIGH-WARP STABILITY: SUB-STEP INTEGRATION ===
                // If delta is too large (high warp), break into smaller steps
                let remainingSimTime = simulationDeltaSeconds;
                let numSubSteps = 0;
                
                while (remainingSimTime > 0 && animating && animationMarker) {
                    // Take step (capped at MAX_SIMULATION_STEP for stability)
                    const stepSize = Math.min(remainingSimTime, MAX_SIMULATION_STEP);
                    
                    // Advance simulation time by this sub-step
                    simulationTime += stepSize;
                    remainingSimTime -= stepSize;
                    numSubSteps++;
                    
                    // Update trajectory progress for this sub-step
                    // At 1x warp: 1500 seconds of real time = full trajectory
                    animationProgress = (simulationTime / trajectoryDurationSeconds) % 1.0;
                    
                    // Note: For physics/particle systems, you would update them here
                    // with stepSize as the delta. For simple trajectory playback,
                    // we just need the final position after all sub-steps.
                }
                
                // DEBUG LOGGING (can be removed after validation)
                if (animating && Math.random() < 0.01) { // Log ~1% of frames to avoid spam
                    console.log(`[TIME DEBUG] Real Δt: ${realDeltaSeconds.toFixed(4)}s, Sim Δt: ${simulationDeltaSeconds.toFixed(4)}s, Warp: ${playbackTimeScale}x, SubSteps: ${numSubSteps}`);
                }
                
                // earth.rotation.y += 0.0001; // Removed rotation
                
                if (animating && animationMarker) {
                    // Use final trajectory position after sub-stepping
                    
                    const index = Math.floor(animationProgress * (trajectory.length - 1));
                    const point = trajectory[index];
                    animationMarker.position.set(point.x, point.y, point.z);
                    
                    // Scale marker based on camera distance (zoom level)
                    // Base size 50 at distance 10000, scales proportionally
                    const baseSize = 50;
                    const baseDistance = 10000;
                    const scaleFactor = Math.max(0.1, Math.min(5, cameraState.radius / baseDistance));
                    animationMarker.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    
                    // === HUD UPDATE ===
                    // Show HUD and Gauges during animation
                    hudCanvas.classList.add('active');
                    gaugeContainer.classList.add('active');
                    decelGaugeContainer.classList.add('active');
                    
                    // Update flight data
                    const alt = point.altitude;
                    const vel = point.velocity;
                    
                    // Calculate derived values
                    let fpa = 0;
                    let pitch = 0; // Vehicle pitch angle
                    let roll = 0; // Vehicle roll angle
                    
                    // G-load and heat flux from simulation (not computed here)
                    let gload = point.gLoad || 0;
                    let heat = point.heatFlux || 0;
                    
                    if (index > 0 && index < trajectory.length - 1) {
                        const prevPoint = trajectory[index - 1];
                        const nextPoint = trajectory[index + 1];
                        
                        // Flight path angle with CORRECT sign convention
                        // Positive = climbing (up), Negative = descending (down)
                        const dh = nextPoint.altitude - prevPoint.altitude; // Positive when climbing
                        const dr = Math.sqrt(
                            Math.pow(nextPoint.x - prevPoint.x, 2) +
                            Math.pow(nextPoint.y - prevPoint.y, 2) +
                            Math.pow(nextPoint.z - prevPoint.z, 2)
                        );
                        // dh > 0 (climbing) → positive FPA
                        // dh < 0 (descending) → negative FPA
                        fpa = Math.atan2(dh, dr) * 180 / Math.PI;
                        
                        // Approximate pitch from velocity vector (assume pitch ≈ FPA for reentry)
                        pitch = fpa;
                        
                        // Roll angle = bank angle from simulation control
                        roll = point.bankAngle || 0;
                    }
                    
                    // Distance to target
                    const distToTarget = Math.sqrt(
                        Math.pow(point.x - targetPoint.x, 2) +
                        Math.pow(point.y - targetPoint.y, 2) +
                        Math.pow(point.z - targetPoint.z, 2)
                    );
                    
                    // Render HUD
                    renderFighterHUD(pitch, roll, vel, alt, fpa, gload, heat, distToTarget);
                    
                    // Update Heat Flux Gauge (convert W/m² to kW/m²)
                    updateHeatFluxGauge((heat || 0) / 1000);
                    
                    // Update Deceleration Gauge
                    updateDecelGauge(gload || 0);
                    
                    // === INTEGRATION: Update Vehicle Viewer ===
                    if (window.VehicleViewer) {
                        window.VehicleViewer.updateState(
                            realDeltaSeconds,           // Time delta in seconds
                            (heat || 0) / 1000,         // Heat flux in kW/m² (convert from W/m²)
                            roll,                        // Bank angle in degrees
                            fpa                          // Flight path angle in degrees
                        );
                    }
                    // === END INTEGRATION ===
                    // === END HUD UPDATE ===
                    
                    // If vehicle-locked, update pivot to follow vehicle
                    if (cameraState.vehicleLocked && cameraState.mode === 'trajectory') {
                        cameraState.targetPivot.set(point.x, point.y, point.z);
                    }
                } else {
                    // Hide HUD and Gauges when not animating
                    hudCanvas.classList.remove('active');
                    gaugeContainer.classList.remove('active');
                    decelGaugeContainer.classList.remove('active');
                    // Apollo capsule viewer: particles naturally dissipate when updateState not called
                }
                
                // Scale all markers (red/green dots) based on camera distance
                const baseSize = 30;
                const baseDistance = 10000;
                const markerScaleFactor = Math.max(0.1, Math.min(5, cameraState.radius / baseDistance));
                markers.forEach(marker => {
                    marker.scale.set(markerScaleFactor, markerScaleFactor, markerScaleFactor);
                });
                
                // Update camera every frame (handles smooth pivot interpolation)
                updateCameraFromSpherical();
                
                renderer.render(scene, camera);
            }

            // Helper functions
            function latLonToCartesian(lat, lon, radius) {
                const phi = (90 - lat) * DEG_TO_RAD;
                const theta = (lon + 180) * DEG_TO_RAD;
                
                return {
                    x: -radius * Math.sin(phi) * Math.cos(theta),
                    y: radius * Math.cos(phi),
                    z: radius * Math.sin(phi) * Math.sin(theta)
                };
            }

            function generateNominalTrajectory() {
                const points = [];
                
                const entryLat = 40.0;
                const entryLon = -100.0;
                const entryAlt = 120;
                const entryVel = 7.8;
                const entryAngle = -1.5 * DEG_TO_RAD;
                
                const landingLat = 34.9;
                const landingLon = -117.9;
                
                let lat = entryLat;
                let lon = entryLon;
                let alt = entryAlt;
                let vel = entryVel;
                let gamma = entryAngle;
                
                const dt = 1.0;
                const g0 = 9.81 / 1000;
                const rho0 = 1.225;
                const H = 7.5;
                const mass = 100000;
                const area = 200;
                const Cd = 1.5;
                const Cl = 0.3;
                
                for (let t = 0; t < 1500; t++) {
                    if (alt < 0) break;
                    
                    const rho = rho0 * Math.exp(-alt / H);
                    const q = 0.5 * rho * (vel * 1000) ** 2;
                    
                    const drag = (q * area * Cd) / mass / 1000;
                    const lift = (q * area * Cl) / mass / 1000;
                    
                    const gravity = g0 * (EARTH_RADIUS / (EARTH_RADIUS + alt)) ** 2;
                    
                    const dv = -drag - gravity * Math.sin(gamma);
                    const dgamma = (lift / vel - gravity * Math.cos(gamma) / vel + vel * Math.cos(gamma) / (EARTH_RADIUS + alt));
                    
                    vel += dv * dt;
                    gamma += dgamma * dt;
                    
                    const dAlt = vel * Math.sin(gamma) * dt;
                    const dRange = vel * Math.cos(gamma) * dt;
                    
                    alt += dAlt;
                    
                    const bearing = Math.atan2(landingLon - lon, landingLat - lat);
                    lat += (dRange / EARTH_RADIUS) * Math.cos(bearing) / DEG_TO_RAD;
                    lon += (dRange / EARTH_RADIUS) * Math.sin(bearing) / (Math.cos(lat * DEG_TO_RAD) * DEG_TO_RAD);
                    
                    if (t % 5 === 0) {
                        const pos = latLonToCartesian(lat, lon, EARTH_RADIUS + alt);
                        points.push({
                            ...pos,
                            lat: lat,
                            lon: lon,
                            altitude: alt,
                            velocity: vel,
                            time: t
                        });
                    }
                }
                
                return points;
            }

            function addMarker(point, color, size) {
                const markerGeometry = new THREE.SphereGeometry(size, 16, 16);
                const markerMaterial = new THREE.MeshBasicMaterial({ color: color });
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.set(point.x, point.y, point.z);
                scene.add(marker);
                return marker; // === INTEGRATION ADDITION ===
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            /* === FIX: VIS MESSAGE HANDLING === */
            // Scene is now fully initialized, send vizReady handshake
            console.log('[VIS-BRIDGE] Scene initialized, sending vizReady handshake');
            sendVizReadyHandshake();
            /* === END FIX === */

            // Initialize warp indicator
            updateWarpIndicator();

            // === INTEGRATION: Apollo CM is now directly integrated, no iframe needed ===
            // Vehicle Viewer API is available via window.VehicleViewer
            // === END INTEGRATION ===

            animate();
        }
    </script>
