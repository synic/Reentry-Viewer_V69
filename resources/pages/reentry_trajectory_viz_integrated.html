<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reentry Trajectory Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        /* === INTEGRATION: Vehicle Viewer Pane === */
        #vehicle-viewer-pane {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 450px;
            height: 320px;
            border: 2px solid #ff6600;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            z-index: 150;
            box-shadow: 0 4px 20px rgba(255, 102, 0, 0.3);
        }
        #vehicle-viewer-pane canvas {
            width: 100% !important;
            height: 100% !important;
        }
        /* === END INTEGRATION === */
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
            font-size: 12px;
            max-width: 300px;
        }
        .info-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #0ff;
            cursor: pointer;
            user-select: none;
        }
        .info-title:hover {
            color: #0f0;
        }
        #info-content {
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        #info-content.collapsed {
            max-height: 0;
        }
        .info-row {
            margin: 3px 0;
        }
        .label {
            color: #888;
            display: inline-block;
            width: 120px;
        }
        .value {
            color: #0f0;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 360px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 8px;
            border: 1px solid #0f0;
            border-radius: 5px;
        }
        button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            margin: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 3px;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        button.active {
            background: #0f0;
            color: #000;
        }

        /* === FIGHTER JET HUD OVERLAY === */
        #hud-canvas {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        #hud-canvas.active {
            display: block;
        }
        
        /* Time Warp Indicator - Between Controls and Settings */
        #warp-indicator {
            position: absolute;
            top: 20px;
            left: 230px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #00ff00;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            text-align: center;
            line-height: 1.4;
            z-index: 200;
            pointer-events: none;
            text-shadow: 0 0 10px #00ff00;
            display: block;
        }

        /* Heat Flux Gauge Styles */
        #heat-flux-gauge-container {
            position: absolute;
            top: 50%;  /* Center vertically in red box area */
            right: 5%;  /* Center horizontally in right 25% */
            transform: translateY(-50%);  /* Center properly */
            width: 224px;  /* 280px * 0.8 = 224px */
            height: 224px;  /* 280px * 0.8 = 224px */
            pointer-events: none;
            z-index: 101;
            display: none;
        }

        #heat-flux-gauge-container.active {
            display: block;
        }

        #gauge-svg {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        #gauge-readout {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;  /* Reverted to original */
            font-weight: bold;
            color: #00ff00;
            letter-spacing: 0.1em;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
            font-family: 'Courier New', monospace;
        }

        #gauge-label {
            position: absolute;
            top: -10px;  /* Just above the gauge */
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;  /* Slightly smaller from 21px */
            font-weight: normal;  /* Not bold */
            color: #00ff00;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;  /* Keep on one line */
        }

        /* Deceleration Gauge Styles */
        #decel-gauge-container {
            position: absolute;
            top: 50%;
            right: 5%;
            transform: translateY(calc(-50% + 260px));  /* Offset below heat flux gauge */
            width: 224px;
            height: 224px;
            pointer-events: none;
            z-index: 101;
            display: none;
        }

        #decel-gauge-container.active {
            display: block;
        }

        #decel-gauge-svg {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        #decel-gauge-readout {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #00ff00;
            letter-spacing: 0.1em;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
            font-family: 'Courier New', monospace;
        }

        #decel-gauge-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: normal;
            color: #00ff00;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>

    <!-- Three.js for main visualization (r128) -->

    <!-- Import map for Vehicle Viewer module (uses Three.js 0.160) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

    <!-- Vehicle Viewer Integration Module -->
    <script type="module">
        // ===================================
        // VEHICLE VIEWER - INTEGRATED
        // ===================================
        import { initializeVehicleViewer } from '../js/vehicle_viewer_module.js';

        console.log('[Vehicle Viewer] Initializing...');

        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize vehicle viewer in the pane
            const container = document.getElementById('vehicle-viewer-pane');
            if (!container) {
                console.error('[Vehicle Viewer] Container not found!');
                return;
            }

            const viewer = initializeVehicleViewer(container);
            console.log('[Vehicle Viewer] Viewer initialized');

            // Start paused (animation must be started by clicking Play)
            viewer.setPlaybackState(false);

            // Internal state for smooth animation
            let cumulativeTime = 0;
            let currentLD = 0.32;  // Default to Apollo L/D

            // Expose API compatible with visualization integration
            window.VehicleViewer = {
                /**
                 * Update the vehicle viewer state
                 * @param {number} dt - Time delta in seconds (from visualization animation)
                 * @param {number} heatFlux - Heat flux in kW/m²
                 * @param {number} bankAngle - Bank angle in degrees
                 * @param {number} flightPathAngle - Flight path angle in degrees
                 */
                updateState: function(dt, heatFlux, bankAngle, flightPathAngle) {
                    // Accumulate time for smooth animation
                    cumulativeTime += dt;

                    // Update vehicle viewer with current state
                    viewer.updateVehicleState({
                        time: cumulativeTime,
                        heatFlux: heatFlux,
                        liftToDrag: currentLD,
                        bankAngle: bankAngle,
                        flightPathAngle: flightPathAngle
                    });
                },

                /**
                 * Set the L/D ratio (called when trajectory is received)
                 * @param {number} ld - Lift-to-drag ratio
                 */
                setLiftToDrag: function(ld) {
                    currentLD = ld;
                    console.log('[Vehicle Viewer] L/D set to:', ld);
                    // Immediately update vehicle viewer so it switches vehicles right away
                    viewer.updateVehicleState({
                        time: cumulativeTime,
                        heatFlux: 0,
                        liftToDrag: currentLD,
                        bankAngle: 0,
                        flightPathAngle: 0
                    });
                },

                /**
                 * Get the current L/D ratio
                 */
                getLiftToDrag: function() {
                    return currentLD;
                },

                /**
                 * Reset cumulative time (call when restarting animation)
                 */
                resetTime: function() {
                    cumulativeTime = 0;
                },

                /**
                 * Set playback state
                 * @param {boolean} playing - true to play, false to pause
                 */
                setPlaybackState: function(playing) {
                    viewer.setPlaybackState(playing);
                },

                /**
                 * Get current vehicle name
                 */
                getVehicleName: function() {
                    return viewer.getVehicleName();
                },

                /**
                 * Dispose of viewer resources
                 */
                dispose: function() {
                    viewer.dispose();
                }
            };

            console.log('[Vehicle Viewer] API ready. Use window.VehicleViewer.updateState(dt, heatFlux, bankAngle, flightPathAngle)');
            console.log('[Vehicle Viewer] Set L/D with window.VehicleViewer.setLiftToDrag(ld)');
        }); // End DOMContentLoaded
    </script>
    
    <script>
        // Wait for Three.js to load
        window.addEventListener('load', function() {
            initVisualization();
        });

        function initVisualization() {
            // === INTEGRATION ADDITION ===
            let injectedTrajectory = null;
            let injectedZeroBankTrajectory = null; // Zero-bank reference trajectory
            let trajectory = null;
            let trajectoryLine = null;
            let zeroBankLine = null; // Cyan dashed line for zero-bank reference
            let orbitalPlaneLine = null; // Cyan dashed circle for orbital plane
            let markers = [];
            let animating = false;
            let animationProgress = 0;
            let animationMarker = null;
            let groundTrack = null;
            let showGroundTrack = false;
            
            // Orbital plane data
            let orbitalPlaneNormal = null;
            let initialPosition = null;
            
            /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
            // Flag to ensure external trajectory data has absolute authority
            let externalTrajectoryActive = false;
            /* === END FIX === */

            // Sun light reference (for dynamic position updates)
            let sunLight = null;
            // === END INTEGRATION ADDITION ===
            
            /* === FIX: VIS MESSAGE HANDLING === */
            // Send vizReady handshake to parent window after initialization
            function sendVizReadyHandshake() {
                if (window.opener) {
                    console.log('[VIS-BRIDGE] Sending vizReady handshake to simulation window');
                    window.opener.postMessage({ type: 'vizReady' }, '*');
                } else {
                    console.warn('[VIS-BRIDGE] No window.opener found, cannot send vizReady');
                }
            }
            /* === END FIX === */
            
            // Listen for trajectory data from parent window
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'TRAJECTORY_DATA') {
                    /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                    console.log('[VIS-BRIDGE] ✓ RECEIVED TRAJECTORY_DATA');
                    console.log('[VIS-BRIDGE] External trajectory received — internal trajectory DISABLED');
                    
                    // CRITICAL: Set authoritative flag - internal trajectory is now permanently disabled
                    externalTrajectoryActive = true;
                    
                    console.log('[VIS-BRIDGE] Payload length:', event.data.payload.length);
                    if (event.data.payload.length > 0) {
                        console.log('[VIS-BRIDGE] First 3 points:', event.data.payload.slice(0, 3));
                    }
                    /* === END FIX === */
                    
                    injectedTrajectory = event.data.payload;
                    
                    // Store orbital plane data
                    if (event.data.orbitalPlane && event.data.initialPosition) {
                        orbitalPlaneNormal = event.data.orbitalPlane;
                        initialPosition = event.data.initialPosition;
                        console.log('[VIS-BRIDGE] ✓ RECEIVED orbital plane data');
                    }
                    
                    // Check for zero-bank reference trajectory
                    if (event.data.zeroBankPayload) {
                        console.log('[VIS-BRIDGE] Received zero-bank reference:', event.data.zeroBankPayload.length, 'points');
                        injectedZeroBankTrajectory = event.data.zeroBankPayload;
                    } else {
                        injectedZeroBankTrajectory = null;
                    }

                    // === VEHICLE VIEWER: Set L/D ratio ===
                    if (event.data.liftToDrag !== undefined && window.VehicleViewer) {
                        window.VehicleViewer.setLiftToDrag(event.data.liftToDrag);
                        console.log('[VIS-BRIDGE] ✓ Set Vehicle Viewer L/D to:', event.data.liftToDrag);
                    } else if (window.VehicleViewer) {
                        // Default to Apollo L/D if not provided
                        window.VehicleViewer.setLiftToDrag(0.32);
                        console.log('[VIS-BRIDGE] Using default L/D: 0.32 (Apollo)');
                    }
                    // Reset vehicle viewer time when new trajectory is received
                    if (window.VehicleViewer) {
                        window.VehicleViewer.resetTime();
                    }
                    // === END VEHICLE VIEWER ===

                    // === APOLLO 10 HISTORICAL SUN POSITION ===
                    console.log('[VIS-BRIDGE] Checking sun position update - isApollo10:', event.data.isApollo10, 'sunLight exists:', !!sunLight);
                    if (event.data.isApollo10 && sunLight) {
                        // Sun position for Apollo 10 reentry: May 26, 1969, ~16:45 UTC
                        // Subsolar point: 21.1°N, 71.25°W (over Caribbean/western Atlantic)
                        sunLight.position.set(1800, 2150, 5300);
                        console.log('[VIS-BRIDGE] ✓ Set Apollo 10 historical sun position:', sunLight.position);
                    } else if (sunLight) {
                        // Default sun position for other scenarios
                        sunLight.position.set(5000, 2000, 3000);
                        console.log('[VIS-BRIDGE] ✓ Set default sun position:', sunLight.position);
                    } else {
                        console.error('[VIS-BRIDGE] ✗ sunLight is null/undefined!');
                    }
                    // === END SUN POSITION ===

                    /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                    // Update trajectory immediately if scene exists
                    if (scene) {
                        console.log('[VIS-BRIDGE] Scene exists, calling updateTrajectory()');
                        console.log('[VIS-BRIDGE] Rendering trajectory from injected data only');
                        updateTrajectory();
                    } else {
                        console.error('[VIS-BRIDGE] Scene not initialized yet!');
                    }
                    /* === END FIX === */
                }
            });
            
            // Function to update trajectory visualization
            function updateTrajectory() {
                // === INTEGRATION ADDITION: Safety check ===
                if (!scene) {
                    console.error('Scene not initialized yet');
                    return;
                }
                console.log('updateTrajectory called, injectedTrajectory:', injectedTrajectory ? injectedTrajectory.length : 'null');
                // === END INTEGRATION ADDITION ===
                
                // Remove old trajectory line
                if (trajectoryLine) {
                    /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                    // Properly dispose of old trajectory geometry and material
                    scene.remove(trajectoryLine);
                    if (trajectoryLine.geometry) trajectoryLine.geometry.dispose();
                    if (trajectoryLine.material) trajectoryLine.material.dispose();
                    trajectoryLine = null;
                    /* === END FIX === */
                }
                
                // === INTEGRATION ADDITION: Remove old zero-bank line ===
                if (zeroBankLine) {
                    scene.remove(zeroBankLine);
                    if (zeroBankLine.geometry) zeroBankLine.geometry.dispose();
                    if (zeroBankLine.material) zeroBankLine.material.dispose();
                    zeroBankLine = null;
                }
                // === END INTEGRATION ADDITION ===
                
                // === ORBITAL PLANE: Remove old orbital plane circle ===
                if (orbitalPlaneLine) {
                    scene.remove(orbitalPlaneLine);
                    if (orbitalPlaneLine.geometry) orbitalPlaneLine.geometry.dispose();
                    if (orbitalPlaneLine.material) orbitalPlaneLine.material.dispose();
                    orbitalPlaneLine = null;
                }
                // === END ORBITAL PLANE ===
                
                // Remove old markers
                markers.forEach(marker => scene.remove(marker));
                markers = [];
                
                // Remove ground track if exists
                if (groundTrack) {
                    scene.remove(groundTrack);
                    groundTrack = null;
                    showGroundTrack = false;
                    // document.getElementById('toggle-ground').classList.remove('active'); // Button removed from UI
                }
                
                /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                // CRITICAL DECISION POINT: External data has absolute authority
                // Generate new trajectory from injected data OR fallback to internal (ONLY if no external data yet)
                if (injectedTrajectory && injectedTrajectory.length > 0) {
                    // EXTERNAL DATA PATH - This becomes the ONLY trajectory once received
                    console.log('[VIS-BRIDGE] Processing injected trajectory, first point:', injectedTrajectory[0]);
                    console.log('[VIS-BRIDGE] Internal trajectory generation BYPASSED - using external data');
                    /* === END FIX === */
                    
                    trajectory = injectedTrajectory.map(point => {
                        /* === FIX: VIS MESSAGE HANDLING === */
                        // Accept both 'altitude' (from simulation) and 'alt' (legacy)
                        const alt = point.altitude !== undefined ? point.altitude : point.alt;
                        if (point.lat === undefined || point.lon === undefined || alt === undefined) {
                            console.error('[VIS-BRIDGE] Invalid point data:', point);
                            return null;
                        }
                        const pos = latLonToCartesian(point.lat, point.lon, EARTH_RADIUS + alt);
                        /* === END FIX === */
                        return {
                            ...pos,
                            lat: point.lat,
                            lon: point.lon,
                            /* === FIX: VIS MESSAGE HANDLING === */
                            altitude: alt,
                            /* === END FIX === */
                            velocity: point.velocity,
                            time: point.time,
                            bankAngle: point.bankAngle || 0,
                            gLoad: point.gLoad || 0,
                            heatFlux: point.heatFlux || 0
                        };
                    }).filter(p => p !== null);
                    /* === FIX: VIS MESSAGE HANDLING === */
                    console.log('[VIS-BRIDGE] ✓ Updated to simulation trajectory:', trajectory.length, 'points');
                    if (trajectory.length > 0) {
                        console.log('[VIS-BRIDGE] First trajectory point:', trajectory[0]);
                        console.log('[VIS-BRIDGE] Last trajectory point:', trajectory[trajectory.length - 1]);
                    }
                    /* === END FIX === */
                    
                /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                } else if (!externalTrajectoryActive) {
                    // INTERNAL FALLBACK PATH - Only allowed if external data has NEVER been received
                    console.log('[VIS-BRIDGE] No external data yet, using internal nominal trajectory');
                    trajectory = generateNominalTrajectory();
                    console.log('[VIS-BRIDGE] Using nominal trajectory, length:', trajectory ? trajectory.length : 'null');
                } else {
                    // External trajectory was active but current data is empty - DO NOT FALLBACK
                    console.error('[VIS-BRIDGE] External trajectory active but data is empty - refusing to render internal trajectory');
                    return;
                }
                /* === END FIX === */
                
                // === INTEGRATION ADDITION: Check trajectory ===
                if (!trajectory || trajectory.length === 0) {
                    console.error('Trajectory is empty or null!');
                    return;
                }
                // === END INTEGRATION ADDITION ===
                
                // Create new trajectory line
                const trajectoryGeometry = new THREE.BufferGeometry();
                const positions = [];
                const colors = [];
                
                for (let i = 0; i < trajectory.length; i++) {
                    const point = trajectory[i];
                    positions.push(point.x, point.y, point.z);
                    
                    const altNorm = Math.min(point.altitude / 120, 1);
                    const r = altNorm;
                    const g = 1 - Math.abs(altNorm - 0.5) * 2;
                    const b = 1 - altNorm;
                    colors.push(r, g, b);
                }
                
                trajectoryGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                trajectoryGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                
                const trajectoryMaterial = new THREE.LineBasicMaterial({ 
                    vertexColors: true,
                    linewidth: 3
                });
                trajectoryLine = new THREE.Line(trajectoryGeometry, trajectoryMaterial);
                scene.add(trajectoryLine);
                
                /* === FIX: EXTERNAL TRAJECTORY AUTHORITY === */
                console.log('[VIS-BRIDGE] ✓ Trajectory line created and added to scene');
                console.log('[VIS-BRIDGE] Trajectory line points:', positions.length / 3);
                console.log('[VIS-BRIDGE] Trajectory line in scene:', scene.children.includes(trajectoryLine));
                /* === END FIX === */
                
                // === INTEGRATION ADDITION: Render zero-bank reference line ===
                if (injectedZeroBankTrajectory && injectedZeroBankTrajectory.length > 0) {
                    const zeroBankTrajectory = injectedZeroBankTrajectory.map(point => {
                        const pos = latLonToCartesian(point.lat, point.lon, EARTH_RADIUS + point.alt);
                        return { ...pos, altitude: point.alt };
                    });
                    
                    const zeroBankGeometry = new THREE.BufferGeometry();
                    const zeroBankPositions = [];
                    
                    for (let i = 0; i < zeroBankTrajectory.length; i++) {
                        const point = zeroBankTrajectory[i];
                        zeroBankPositions.push(point.x, point.y, point.z);
                    }
                    
                    zeroBankGeometry.setAttribute('position', new THREE.Float32BufferAttribute(zeroBankPositions, 3));
                    
                    // Cyan dashed line material
                    const zeroBankMaterial = new THREE.LineDashedMaterial({
                        color: 0x00ffff, // Cyan
                        linewidth: 2,
                        dashSize: 50,
                        gapSize: 25
                    });
                    
                    zeroBankLine = new THREE.Line(zeroBankGeometry, zeroBankMaterial);
                    zeroBankLine.computeLineDistances(); // Required for dashed lines
                    scene.add(zeroBankLine);
                    console.log('Zero-bank reference line rendered (cyan dashed)');
                }
                // === END INTEGRATION ADDITION ===
                
                // === ORBITAL PLANE: Render orbital plane great circle ===
                // Use first trajectory point to define the orbital plane
                if (trajectory && trajectory.length > 1) {
                    console.log('[ORBITAL-PLANE] Creating orbital plane circle from trajectory');
                    
                    const circlePoints = [];
                    const numPoints = 360; // One point per degree
                    
                    // Use first trajectory point as reference
                    const p0 = trajectory[0];
                    const p1 = trajectory[1];
                    
                    // Initial position vector (ECEF)
                    const r0_x = p0.x;
                    const r0_y = p0.y;
                    const r0_z = p0.z;
                    const r0_mag = Math.sqrt(r0_x**2 + r0_y**2 + r0_z**2);
                    
                    // Initial velocity vector (approximate from first two points)
                    const v0_x = p1.x - p0.x;
                    const v0_y = p1.y - p0.y;
                    const v0_z = p1.z - p0.z;
                    
                    // Orbital plane normal: n = r0 × v0
                    let n_x = r0_y * v0_z - r0_z * v0_y;
                    let n_y = r0_z * v0_x - r0_x * v0_z;
                    let n_z = r0_x * v0_y - r0_y * v0_x;
                    
                    // Normalize
                    const n_mag = Math.sqrt(n_x**2 + n_y**2 + n_z**2);
                    n_x /= n_mag;
                    n_y /= n_mag;
                    n_z /= n_mag;
                    
                    // Get two orthogonal vectors in the orbital plane
                    // First vector: initial position (normalized)
                    const u1_x = r0_x / r0_mag;
                    const u1_y = r0_y / r0_mag;
                    const u1_z = r0_z / r0_mag;
                    
                    // Second vector: perpendicular to both normal and u1
                    // u2 = n × u1
                    const u2_x = n_y * u1_z - n_z * u1_y;
                    const u2_y = n_z * u1_x - n_x * u1_z;
                    const u2_z = n_x * u1_y - n_y * u1_x;
                    
                    // Generate circle points at the same radius as initial position
                    for (let i = 0; i <= numPoints; i++) {
                        const angle = (i / numPoints) * 2 * Math.PI;
                        const cos_a = Math.cos(angle);
                        const sin_a = Math.sin(angle);
                        
                        // Point on circle: r = r0_mag * (cos(θ)*u1 + sin(θ)*u2)
                        const x = r0_mag * (cos_a * u1_x + sin_a * u2_x);
                        const y = r0_mag * (cos_a * u1_y + sin_a * u2_y);
                        const z = r0_mag * (cos_a * u1_z + sin_a * u2_z);
                        
                        circlePoints.push(x, y, z);
                    }
                    
                    const circleGeometry = new THREE.BufferGeometry();
                    circleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(circlePoints, 3));
                    
                    // Cyan dashed line material
                    const circleMaterial = new THREE.LineDashedMaterial({
                        color: 0x00ffff, // Cyan
                        linewidth: 2,
                        dashSize: 100,
                        gapSize: 50
                    });
                    
                    orbitalPlaneLine = new THREE.Line(circleGeometry, circleMaterial);
                    orbitalPlaneLine.computeLineDistances(); // Required for dashed lines
                    scene.add(orbitalPlaneLine);
                    console.log('[ORBITAL-PLANE] ✓ Orbital plane circle rendered at radius', r0_mag.toFixed(1), 'km (cyan dashed, 360 points)');
                    console.log('[ORBITAL-PLANE] ✓ Circle passes through first trajectory point:', p0);
                }

                markers.push(marker1, marker3);

                    animationMarker = null;

                    if (trajectory.length > 0) {

                            trajectory[cameraState.trajectoryIndex].x,
                            trajectory[cameraState.trajectoryIndex].y,
                            trajectory[cameraState.trajectoryIndex].z
                        );
                    }
                }
            }

            const starsMaterial = new THREE.PointsMaterial({

                size: 1.5,
                sizeAttenuation: false  // Keep stars same size regardless of distance
            });
            const starsVertices = [];
            const starDistance = 150000; // Very far away (150,000 km) - acts as skybox
            for (let i = 0; i < 3000; i++) {  // Reduced from 10,000 to 3,000
                // Generate random point on a sphere surface
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = starDistance * Math.sin(phi) * Math.cos(theta);

                const z = starDistance * Math.cos(phi);

                    pivotIndicator.visible = true; // Show in trajectory mode
                }
                
                // Update pivot indicator position
                pivotIndicator.position.copy(cameraState.targetPivot);
                
                // Recalculate spherical coords relative to new pivot
                const relativePos = new THREE.Vector3().subVectors(camera.position, cameraState.targetPivot);
                cameraState.radius = relativePos.length();
                cameraState.yaw = Math.atan2(relativePos.z, relativePos.x);
                cameraState.pitch = Math.acos(relativePos.y / cameraState.radius);
                
                // Clamp radius to mode-specific limits
                const limits = getCurrentZoomLimits();
                cameraState.radius = Math.max(limits.min, Math.min(limits.max, cameraState.radius));
                
                updateCameraFromSpherical();
                
                console.log(`Camera mode: ${mode}, Zoom limits: ${limits.min.toFixed(0)} - ${limits.max.toFixed(0)} km`);
            }
            
            // Initialize in global mode
            setCameraMode('global');

            // === HUD INITIALIZATION ===
            const hudCanvas = document.getElementById('hud-canvas');
            const hudCtx = hudCanvas.getContext('2d');
            let targetPoint = { x: 0, y: 0, z: 0 }; // Will be updated when trajectory loads
            
            // HUD rendering function
            function renderFighterHUD(pitch, roll, velocity, altitude, fpa, gload, heat, distToTarget) {
                // Clear canvas
                hudCtx.clearRect(0, 0, hudCanvas.width, hudCanvas.height);
                
                // HUD confined to top-right 25% of screen
                const hudWidth = hudCanvas.width * 0.25;
                const hudHeight = hudCanvas.height * 0.25;
                const hudX = hudCanvas.width - hudWidth - 20; // 20px margin
                const hudY = 20; // 20px from top
                const centerX = hudX + hudWidth / 2;
                const centerY = hudY + hudHeight / 2;
                
                // HUD style
                hudCtx.strokeStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.lineWidth = 1;
                hudCtx.font = '12px monospace';
                
                // === ROLL SCALE AT TOP (optional but realistic) ===
                hudCtx.save();
                hudCtx.translate(centerX, hudY + 10);
                
                // Bank angle scale
                hudCtx.beginPath();
                hudCtx.arc(0, 0, hudWidth * 0.3, -Math.PI * 0.6, -Math.PI * 0.4);
                hudCtx.stroke();
                
                // Bank tick marks at 0, ±30, ±60
                for (let bankAngle of [-60, -30, 0, 30, 60]) {
                    const angle = -Math.PI / 2 + (bankAngle * Math.PI / 180);
                    const r1 = hudWidth * 0.3;
                    const r2 = bankAngle === 0 ? r1 + 8 : r1 + 5;
                    hudCtx.beginPath();
                    hudCtx.moveTo(Math.cos(angle) * r1, Math.sin(angle) * r1);
                    hudCtx.lineTo(Math.cos(angle) * r2, Math.sin(angle) * r2);
                    hudCtx.stroke();
                }
                
                // Bank pointer (aircraft symbol)
                const rollLimited = Math.max(-60, Math.min(60, roll));
                const rollAngle = -Math.PI / 2 - (rollLimited * Math.PI / 180);
                hudCtx.rotate(rollAngle + Math.PI / 2);
                hudCtx.beginPath();
                hudCtx.moveTo(0, -hudWidth * 0.3 - 10);
                hudCtx.lineTo(-5, -hudWidth * 0.3 - 3);
                hudCtx.lineTo(5, -hudWidth * 0.3 - 3);
                hudCtx.closePath();
                hudCtx.fill();
                
                hudCtx.restore();
                
                // === PITCH LADDER (ROTATES WITH ROLL - NO LIMITS) ===
                hudCtx.save();
                hudCtx.translate(centerX, centerY);
                
                // Rotate entire pitch ladder opposite to bank angle (aircraft banks right, horizon tilts left)
                const rollRad = roll * Math.PI / 180;  // Positive roll = rotate pitch ladder left
                hudCtx.rotate(rollRad);
                
                const pixelsPerDegree = hudHeight / 60; // 60° vertical FOV
                
                // Draw pitch ladder lines every 5°
                for (let angle = -90; angle <= 90; angle += 5) {
                    const y = -(angle - pitch) * pixelsPerDegree;  // Negative sign fixes inversion
                    if (Math.abs(y) > hudHeight / 2) continue; // Skip if outside HUD area
                    
                    const isHorizon = angle === 0;
                    const isMajor = angle % 10 === 0;
                    const isNegative = angle < 0;
                    
                    if (isHorizon) {
                        // Horizon line (thicker, longer, solid)
                        hudCtx.lineWidth = 2;
                        hudCtx.setLineDash([]);
                        hudCtx.beginPath();
                        hudCtx.moveTo(-hudWidth * 0.35, y);
                        hudCtx.lineTo(hudWidth * 0.35, y);
                        hudCtx.stroke();
                        hudCtx.lineWidth = 1;
                    } else {
                        // Pitch lines (dashed if negative)
                        if (isNegative) {
                            hudCtx.setLineDash([4, 4]); // Dashed for negative pitch
                        } else {
                            hudCtx.setLineDash([]); // Solid for positive pitch
                        }
                        
                        const lineLen = isMajor ? hudWidth * 0.15 : hudWidth * 0.08;
                        hudCtx.beginPath();
                        hudCtx.moveTo(-lineLen, y);
                        hudCtx.lineTo(lineLen, y);
                        hudCtx.stroke();
                        
                        // Numeric labels every 10°
                        if (isMajor && angle !== 0) {
                            hudCtx.save();
                            hudCtx.translate(lineLen + 5, y);
                            hudCtx.rotate(-rollRad); // Keep text upright
                            hudCtx.textAlign = 'left';
                            hudCtx.textBaseline = 'middle';
                            hudCtx.fillText(Math.abs(angle), 0, 0);
                            hudCtx.restore();
                            
                            hudCtx.save();
                            hudCtx.translate(-lineLen - 5, y);
                            hudCtx.rotate(-rollRad); // Keep text upright
                            hudCtx.textAlign = 'right';
                            hudCtx.textBaseline = 'middle';
                            hudCtx.fillText(Math.abs(angle), 0, 0);
                            hudCtx.restore();
                        }
                    }
                }
                
                // Reset line dash
                hudCtx.setLineDash([]);
                
                hudCtx.restore();
                
                // === FLIGHT PATH MARKER (UNBANKED - screen-aligned) ===
                // Flight path marker does NOT rotate with roll
                hudCtx.save();
                hudCtx.translate(centerX, centerY);
                
                const fpmY = (pitch - fpa) * pixelsPerDegree;
                const fpmX = 0; // Centered
                
                if (Math.abs(fpmY) < hudHeight / 2) {
                    const fpmSize = 8;
                    hudCtx.beginPath();
                    hudCtx.arc(fpmX, fpmY, fpmSize, 0, Math.PI * 2);
                    hudCtx.stroke();
                    
                    // Wings (horizontal, unbanked)
                    hudCtx.beginPath();
                    hudCtx.moveTo(fpmX - fpmSize - 10, fpmY);
                    hudCtx.lineTo(fpmX - fpmSize, fpmY);
                    hudCtx.stroke();
                    
                    hudCtx.beginPath();
                    hudCtx.moveTo(fpmX + fpmSize, fpmY);
                    hudCtx.lineTo(fpmX + fpmSize + 10, fpmY);
                    hudCtx.stroke();
                    
                    // Center dot
                    hudCtx.fillRect(fpmX - 1, fpmY - 1, 2, 2);
                }
                
                hudCtx.restore();
                
                // === AIRSPEED TAPE (LEFT SIDE) ===
                hudCtx.save();
                const speedTapeX = centerX - hudWidth * 0.42;  // Moved further left (was 0.3)
                const speedTapeY = centerY;
                const speedTapeHeight = 200;
                const speedTapeWidth = 50;
                
                // Current velocity in m/s
                const currentSpeed = velocity !== null ? velocity * 1000 : 0; // m/s
                
                // Draw speed scale (range: ±500 m/s from current)
                const speedRange = 500;
                const pixelsPerSpeed = speedTapeHeight / (2 * speedRange);
                
                hudCtx.strokeStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.font = '14px monospace';
                hudCtx.lineWidth = 2;
                
                // Draw tick marks and labels (F-35 style)
                const speedIncrement = 100;
                for (let offset = -speedRange; offset <= speedRange; offset += speedIncrement) {
                    const speedVal = currentSpeed + offset;
                    if (speedVal < 0) continue;
                    
                    const y = speedTapeY - offset * pixelsPerSpeed;
                    if (Math.abs(y - speedTapeY) > speedTapeHeight/2) continue;
                    
                    // Tick mark (short horizontal line on right edge)
                    hudCtx.beginPath();
                    hudCtx.moveTo(speedTapeX, y);
                    hudCtx.lineTo(speedTapeX + 15, y);
                    hudCtx.stroke();
                    
                    // Label (right of tick)
                    hudCtx.textAlign = 'left';
                    hudCtx.textBaseline = 'middle';
                    hudCtx.fillText(speedVal.toFixed(0), speedTapeX + 18, y);
                }
                
                // Draw vertical reference line
                hudCtx.beginPath();
                hudCtx.moveTo(speedTapeX, speedTapeY - speedTapeHeight/2);
                hudCtx.lineTo(speedTapeX, speedTapeY + speedTapeHeight/2);
                hudCtx.stroke();
                
                // Draw current speed box (staple shape on right side)
                const speedBoxWidth = 70;
                const speedBoxHeight = 28;
                
                // Box background
                hudCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                hudCtx.fillRect(speedTapeX - 5, speedTapeY - speedBoxHeight/2, speedBoxWidth, speedBoxHeight);
                
                // Box outline
                hudCtx.strokeStyle = 'rgba(0, 255, 0, 1)';
                hudCtx.lineWidth = 2;
                hudCtx.strokeRect(speedTapeX - 5, speedTapeY - speedBoxHeight/2, speedBoxWidth, speedBoxHeight);
                
                // Current speed value (inside box)
                hudCtx.fillStyle = 'rgba(0, 255, 0, 1)';
                hudCtx.font = 'bold 18px monospace';
                hudCtx.textAlign = 'center';
                hudCtx.textBaseline = 'middle';
                hudCtx.fillText(currentSpeed.toFixed(0), speedTapeX + speedBoxWidth/2 - 5, speedTapeY);
                
                hudCtx.restore();
                
                // === ALTITUDE TAPE (RIGHT SIDE) ===
                hudCtx.save();
                const altTapeX = centerX + hudWidth * 0.42;  // Moved further right (was 0.3)
                const altTapeY = centerY;
                const altTapeHeight = 200;
                
                // Current altitude in km
                const currentAlt = altitude !== null ? altitude : 0;
                
                // Draw altitude scale (range: ±50 km from current)
                const altRange = 50;
                const pixelsPerAlt = altTapeHeight / (2 * altRange);
                
                hudCtx.strokeStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
                hudCtx.font = '14px monospace';
                hudCtx.lineWidth = 2;
                
                // Draw tick marks and labels (F-35 style)
                const altIncrement = 10;
                for (let offset = -altRange; offset <= altRange; offset += altIncrement) {
                    const altVal = currentAlt + offset;
                    if (altVal < 0) continue;
                    
                    const y = altTapeY - offset * pixelsPerAlt;
                    if (Math.abs(y - altTapeY) > altTapeHeight/2) continue;
                    
                    // Tick mark (short horizontal line on left edge)
                    hudCtx.beginPath();
                    hudCtx.moveTo(altTapeX - 15, y);
                    hudCtx.lineTo(altTapeX, y);
                    hudCtx.stroke();
                    
                    // Label (left of tick)
                    hudCtx.textAlign = 'right';
                    hudCtx.textBaseline = 'middle';
                    hudCtx.fillText(altVal.toFixed(0), altTapeX - 18, y);
                }
                
                // Draw vertical reference line
                hudCtx.beginPath();
                hudCtx.moveTo(altTapeX, altTapeY - altTapeHeight/2);
                hudCtx.lineTo(altTapeX, altTapeY + altTapeHeight/2);
                hudCtx.stroke();
                
                // Draw current altitude box (staple shape on left side)
                const altBoxWidth = 70;
                const altBoxHeight = 28;
                
                // Box background
                hudCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                hudCtx.fillRect(altTapeX - altBoxWidth + 5, altTapeY - altBoxHeight/2, altBoxWidth, altBoxHeight);
                
                // Box outline
                hudCtx.strokeStyle = 'rgba(0, 255, 0, 1)';
                hudCtx.lineWidth = 2;
                hudCtx.strokeRect(altTapeX - altBoxWidth + 5, altTapeY - altBoxHeight/2, altBoxWidth, altBoxHeight);
                
                // Current altitude value (inside box)
                hudCtx.fillStyle = 'rgba(0, 255, 0, 1)';
                hudCtx.font = 'bold 18px monospace';
                hudCtx.textAlign = 'center';
                hudCtx.textBaseline = 'middle';
                hudCtx.fillText(currentAlt.toFixed(1), altTapeX - altBoxWidth/2 + 5, altTapeY);
                
                hudCtx.restore();
                
                // === MACH NUMBER (LOWER LEFT - SYMMETRIC WITH G-LOAD) ===
                // Compute speed of sound based on altitude (simplified atmospheric model)
                // Below 11km: T = 288.15 - 6.5*h, Above 11km: T ≈ 216.65K (stratosphere)
                let tempK;
                if (altitude < 11) {
                    tempK = 288.15 - 6.5 * altitude;  // Troposphere lapse rate
                } else if (altitude < 25) {
                    tempK = 216.65;  // Stratosphere (roughly isothermal)
                } else if (altitude < 47) {
                    tempK = 216.65 + 2.8 * (altitude - 25);  // Upper stratosphere
                } else {
                    tempK = 270.65;  // Mesosphere approximation
                }
                // Speed of sound = sqrt(gamma * R * T) where gamma=1.4, R=287 J/(kg·K)
                const speedOfSound = Math.sqrt(1.4 * 287 * tempK);  // m/s
                const velocityMs = velocity * 1000;  // Convert km/s to m/s
                const machNumber = velocityMs / speedOfSound;

                hudCtx.font = 'bold 16px monospace';
                hudCtx.textAlign = 'center';
                hudCtx.textBaseline = 'middle';
                const machValue = machNumber !== null && isFinite(machNumber) ? 'M' + machNumber.toFixed(1) : '---';

                // Color code Mach number
                if (machNumber > 25) {
                    hudCtx.fillStyle = 'rgba(255, 0, 0, 0.9)';  // Hypersonic+
                } else if (machNumber > 5) {
                    hudCtx.fillStyle = 'rgba(255, 255, 0, 0.85)';  // Hypersonic
                } else {
                    hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
                }
                // Position symmetrically opposite to G-load (lower left)
                hudCtx.fillText(machValue, hudX + hudWidth * 0.15, hudY + hudHeight + 36);
                hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';

                // === G-LOAD (LOWER RIGHT) ===
                hudCtx.font = 'bold 16px monospace';
                hudCtx.textAlign = 'center';
                hudCtx.textBaseline = 'middle';
                const gSign = gload >= 0 ? '+' : '';
                const gValue = gload !== null ? gSign + gload.toFixed(1) + 'G' : '---';

                // Color code G-load
                if (gload !== null && Math.abs(gload) > 6) {
                    hudCtx.fillStyle = 'rgba(255, 0, 0, 0.9)';
                } else if (gload !== null && Math.abs(gload) > 4) {
                    hudCtx.fillStyle = 'rgba(255, 255, 0, 0.85)';
                } else {
                    hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
                }
                // Position in blue square area (moved up 1.5 font widths = 24px)
                hudCtx.fillText(gValue, hudX + hudWidth * 0.85, hudY + hudHeight + 36);  // 60 - 24 = 36
                hudCtx.fillStyle = 'rgba(0, 255, 0, 0.75)';
            }
            
            // Resize HUD canvas to match window
            function resizeHUDCanvas() {
                hudCanvas.width = window.innerWidth;
                hudCanvas.height = window.innerHeight;
            }
            resizeHUDCanvas();
            window.addEventListener('resize', resizeHUDCanvas);
            
            console.log('Fighter HUD initialized');
            // === END HUD INITIALIZATION ===

            // ========================================================================
            // HEAT FLUX GAUGE INITIALIZATION
            // ========================================================================
            const gaugeSVG = document.getElementById('gauge-svg');
            const gaugeReadout = document.getElementById('gauge-readout');
            const gaugeContainer = document.getElementById('heat-flux-gauge-container');
            let gaugePointerElement = null;
            let peakNeedleElement = null;  // Peak heat flux needle
            let currentGaugeValue = 0;
            let targetGaugeValue = 0;
            let peakGaugeValue = 0;  // Track peak heat flux
            
            const gaugeConfig = {
                min: 0,
                max: 15000,
                units: "kW/m²",
                majorTickInterval: 3000,
                minorTickInterval: 750
            };
            
            const gaugeColorRanges = [
                { start: 0, end: 3000, color: '#00ff00' },      // Green
                { start: 3000, end: 6000, color: '#ffff00' },   // Yellow
                { start: 6000, end: 9000, color: '#ff8000' },   // Orange
                { start: 9000, end: 15000, color: '#ff0000' }   // Red
            ];
            
            function createDefsElement() {
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                gaugeSVG.appendChild(defs);
                return defs;
            }
            
            function createArcPath(cx, cy, radius, width, startAngle, endAngle) {
                const innerRadius = radius - width / 2;
                const outerRadius = radius + width / 2;
                const startRad = (startAngle - 90) * Math.PI / 180;
                const endRad = (endAngle - 90) * Math.PI / 180;
                
                const x1 = cx + outerRadius * Math.cos(startRad);
                const y1 = cy + outerRadius * Math.sin(startRad);
                const x2 = cx + outerRadius * Math.cos(endRad);
                const y2 = cy + outerRadius * Math.sin(endRad);
                const x3 = cx + innerRadius * Math.cos(endRad);
                const y3 = cy + innerRadius * Math.sin(endRad);
                const x4 = cx + innerRadius * Math.cos(startRad);
                const y4 = cy + innerRadius * Math.sin(startRad);
                
                const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const d = `M ${x1} ${y1} A ${outerRadius} ${outerRadius} 0 ${largeArc} 1 ${x2} ${y2} L ${x3} ${y3} A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${x4} ${y4} Z`;
                path.setAttribute('d', d);
                return path;
            }
            
            function drawGaugeColorArc() {
                const centerX = 250, centerY = 250, radius = 180, arcWidth = 20;
                const startAngle = -225, endAngle = 45, totalAngle = endAngle - startAngle;
                const defs = gaugeSVG.querySelector('defs') || createDefsElement();
                
                gaugeColorRanges.forEach((range, index) => {
                    const rangeStartAngle = startAngle + (range.start / gaugeConfig.max) * totalAngle;
                    const rangeEndAngle = startAngle + (range.end / gaugeConfig.max) * totalAngle;
                    const gradientId = `gradient${index}`;
                    const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                    gradient.setAttribute('id', gradientId);
                    gradient.setAttribute('gradientUnits', 'userSpaceOnUse');
                    
                    const startRad = (rangeStartAngle - 90) * Math.PI / 180;
                    const endRad = (rangeEndAngle - 90) * Math.PI / 180;
                    gradient.setAttribute('x1', centerX + radius * Math.cos(startRad));
                    gradient.setAttribute('y1', centerY + radius * Math.sin(startRad));
                    gradient.setAttribute('x2', centerX + radius * Math.cos(endRad));
                    gradient.setAttribute('y2', centerY + radius * Math.sin(endRad));
                    
                    const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                    stop1.setAttribute('offset', '0%');
                    stop1.setAttribute('stop-color', range.color);
                    const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                    stop2.setAttribute('offset', '100%');
                    stop2.setAttribute('stop-color', index < gaugeColorRanges.length - 1 ? gaugeColorRanges[index + 1].color : range.color);
                    
                    gradient.appendChild(stop1);
                    gradient.appendChild(stop2);
                    defs.appendChild(gradient);
                    
                    const arc = createArcPath(centerX, centerY, radius, arcWidth, rangeStartAngle, rangeEndAngle);
                    arc.setAttribute('fill', `url(#${gradientId})`);
                    arc.setAttribute('opacity', '0.95');
                    gaugeSVG.appendChild(arc);
                });
            }
            
            function drawGaugeTick(cx, cy, radius, angle, length, width, color) {
                const angleRad = (angle - 90) * Math.PI / 180;
                const innerRadius = radius - length;
                const x1 = cx + innerRadius * Math.cos(angleRad);
                const y1 = cy + innerRadius * Math.sin(angleRad);
                const x2 = cx + radius * Math.cos(angleRad);
                const y2 = cy + radius * Math.sin(angleRad);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', color);
                line.setAttribute('stroke-width', width);
                line.setAttribute('stroke-linecap', 'round');
                gaugeSVG.appendChild(line);
            }
            
            function drawGaugeLabel(cx, cy, radius, angle, value) {
                const angleRad = (angle - 90) * Math.PI / 180;
                const x = cx + radius * Math.cos(angleRad);
                const y = cy + radius * Math.sin(angleRad);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('fill', '#00ff00');
                text.setAttribute('font-size', '34');  /* Updated to 34px */
                text.setAttribute('font-weight', 'bold');
                text.textContent = value;
                gaugeSVG.appendChild(text);
            }
            
            function drawGaugeTickMarks() {
                const centerX = 250, centerY = 250, radius = 180;
                const startAngle = -225, endAngle = 45, totalAngle = endAngle - startAngle;
                
                for (let value = gaugeConfig.min; value <= gaugeConfig.max; value += gaugeConfig.majorTickInterval) {
                    const angle = startAngle + (value / gaugeConfig.max) * totalAngle;
                    drawGaugeTick(centerX, centerY, radius, angle, 12, 1.5, '#ffffff');
                    drawGaugeLabel(centerX, centerY, radius - 35, angle, value / 1000);
                }
                
                for (let value = gaugeConfig.min; value <= gaugeConfig.max; value += gaugeConfig.minorTickInterval) {
                    if (value % gaugeConfig.majorTickInterval !== 0) {
                        const angle = startAngle + (value / gaugeConfig.max) * totalAngle;
                        drawGaugeTick(centerX, centerY, radius, angle, 6, 1, '#cccccc');
                    }
                }
            }
            
            function createGaugePointer() {
                const centerX = 250, centerY = 250, pointerLength = 140;
                gaugePointerElement = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                gaugePointerElement.setAttribute('transform', `rotate(-225 ${centerX} ${centerY})`);
                
                const pointer = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const points = `${centerX},${centerY - pointerLength} ${centerX - 6},${centerY + 12} ${centerX + 6},${centerY + 12}`;
                pointer.setAttribute('points', points);
                pointer.setAttribute('fill', '#00ff00');
                pointer.setAttribute('stroke', '#ffffff');
                pointer.setAttribute('stroke-width', '1');
                gaugePointerElement.appendChild(pointer);
                gaugeSVG.appendChild(gaugePointerElement);
            }
            
            function createPeakNeedle() {
                const centerX = 250, centerY = 250, needleLength = 150;
                peakNeedleElement = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                peakNeedleElement.setAttribute('transform', `rotate(-225 ${centerX} ${centerY})`);
                
                // Thin line needle for peak indicator
                const needle = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                needle.setAttribute('x1', centerX);
                needle.setAttribute('y1', centerY);
                needle.setAttribute('x2', centerX);
                needle.setAttribute('y2', centerY - needleLength);
                needle.setAttribute('stroke', '#00ff00');  // Will be updated with color
                needle.setAttribute('stroke-width', '3');
                needle.setAttribute('stroke-linecap', 'round');
                needle.setAttribute('id', 'peak-needle-line');
                peakNeedleElement.appendChild(needle);
                gaugeSVG.appendChild(peakNeedleElement);
            }
            
            function updatePeakNeedle(value) {
                const centerX = 250, centerY = 250;
                const startAngle = -225, endAngle = 45, totalAngle = endAngle - startAngle;
                const clampedValue = Math.min(value, gaugeConfig.max);
                const angle = startAngle + (clampedValue / gaugeConfig.max) * totalAngle;
                peakNeedleElement.setAttribute('transform', `rotate(${angle} ${centerX} ${centerY})`);
                
                // Update color to match the arc
                const color = getColorForValue(value);
                const needleLine = peakNeedleElement.querySelector('#peak-needle-line');
                if (needleLine) {

            /* === END FIX === */

            // Mouse controls

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    if (cameraState.mode === 'trajectory' && cameraState.horizonLocked) {
                        // Rotate in local frame so drag axes match what the user sees on screen
                        orbitLocalFrame(deltaX * cameraState.rotationSpeed, deltaY * cameraState.rotationSpeed);
                    } else {
                        // Global mode: standard spherical yaw/pitch
                        cameraState.yaw -= deltaX * cameraState.rotationSpeed;
                        cameraState.pitch += deltaY * cameraState.rotationSpeed;
                        cameraState.pitch = Math.max(cameraState.minPitch,
                                                      Math.min(cameraState.maxPitch, cameraState.pitch));
                    }

                    updateCameraFromSpherical();
                    
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {

            renderer.domElement.addEventListener('wheel', (e) => {

                // Check if Shift is held for pivot scrolling

                    // Shift + Scroll = Move pivot along trajectory

                    cameraState.trajectoryIndex += direction * cameraState.pivotScrollSpeed;
                    
                    // Clamp to trajectory bounds

                    updateTrajectoryPivot();
                    console.log(`Pivot at trajectory point ${cameraState.trajectoryIndex}/${trajectory.length}`);
                } else {
                    // Normal scroll = Exponential zoom
                    const limits = getCurrentZoomLimits();
                    const zoomFactor = e.deltaY > 0 ? cameraState.zoomSpeed : (1 / cameraState.zoomSpeed);
                    
                    cameraState.radius *= zoomFactor;
                    cameraState.radius = Math.max(limits.min, Math.min(limits.max, cameraState.radius));
                }
                
                updateCameraFromSpherical();
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        if (cameraState.mode === 'trajectory' && cameraState.horizonLocked) {
                            orbitLocalFrame(-cameraState.keyRotationSpeed, 0);
                        } else {

                        updateCameraFromSpherical();

                    case 'ArrowRight':
                        e.preventDefault();
                        if (cameraState.mode === 'trajectory' && cameraState.horizonLocked) {
                            orbitLocalFrame(cameraState.keyRotationSpeed, 0);

                            cameraState.yaw += cameraState.keyRotationSpeed;

                        break;
                    case 'v':

                        e.preventDefault();
                        if (cameraState.mode === 'trajectory') {
                            cameraState.vehicleLocked = !cameraState.vehicleLocked;

                            document.getElementById('vehicle-lock-btn').classList.toggle('active', cameraState.vehicleLocked);
                            
                            // Snap to chase view when locking
                            if (cameraState.vehicleLocked && animationMarker && trajectory.length > 0) {
                                const index = Math.floor(animationProgress * (trajectory.length - 1));
                                const currentPoint = trajectory[index];
                                
                                // STEP 2: Compute velocity direction (forward motion)
                                // Use FORWARD difference: velocity points from current to next
                                let velX = 0, velY = 0, velZ = 0;
                                
                                if (index < trajectory.length - 1) {
                                    const nextPoint = trajectory[index + 1];
                                    velX = nextPoint.x - currentPoint.x;
                                    velY = nextPoint.y - currentPoint.y;
                                    velZ = nextPoint.z - currentPoint.z;
                                } else if (index > 0) {
                                    const prevPoint = trajectory[index - 1];
                                    velX = currentPoint.x - prevPoint.x;
                                    velY = currentPoint.y - prevPoint.y;
                                    velZ = currentPoint.z - prevPoint.z;
                                }
                                
                                // Normalize velocity vector
                                const velMag = Math.sqrt(velX*velX + velY*velY + velZ*velZ);
                                if (velMag > 0) {
                                    const normVelX = velX / velMag;
                                    const normVelY = velY / velMag;
                                    const normVelZ = velZ / velMag;
                                    
                                    // STEP 1: Get local up vector (radial from Earth center through vehicle)
                                    const upMag = Math.sqrt(currentPoint.x**2 + currentPoint.y**2 + currentPoint.z**2);
                                    const localUpX = currentPoint.x / upMag;
                                    const localUpY = currentPoint.y / upMag;
                                    const localUpZ = currentPoint.z / upMag;
                                    
                                    // STEP 3: Position camera BEHIND vehicle
                                    // CameraPosition = VehiclePosition - (NormalizedVelocity * ChaseDistance) + (LocalUpVector * VerticalOffset)
                                    const chaseDistance = 200; // Behind vehicle (NEGATIVE of velocity)
                                    const verticalOffset = 80;  // Above vehicle
                                    
                                    // This places camera OPPOSITE to velocity direction (behind)
                                    const camX = currentPoint.x - normVelX * chaseDistance + localUpX * verticalOffset;
                                    const camY = currentPoint.y - normVelY * chaseDistance + localUpY * verticalOffset;
                                    const camZ = currentPoint.z - normVelZ * chaseDistance + localUpZ * verticalOffset;
                                    
                                    // DEBUG VALIDATION: Verify camera is behind vehicle
                                    const camToVehicleX = currentPoint.x - camX;
                                    const camToVehicleY = currentPoint.y - camY;
                                    const camToVehicleZ = currentPoint.z - camZ;
                                    const dotProduct = camToVehicleX * normVelX + camToVehicleY * normVelY + camToVehicleZ * normVelZ;
                                    console.log(`[CHASE CAM DEBUG] Dot product (MUST be > 0): ${dotProduct.toFixed(3)}`);
                                    console.log(`[CHASE CAM DEBUG] Camera behind: ${dotProduct > 0 ? 'YES ✓' : 'NO ✗ FAIL'}`);
                                    
                                    // Set camera position directly (bypass spherical coords initially)
                                    camera.position.set(camX, camY, camZ);
                                    
                                    // STEP 4: Camera orientation target
                                    // Look toward vehicle (forward vector points from camera to vehicle)
                                    const forwardX = currentPoint.x - camX;
                                    const forwardY = currentPoint.y - camY;
                                    const forwardZ = currentPoint.z - camZ;
                                    const forwardMag = Math.sqrt(forwardX**2 + forwardY**2 + forwardZ**2);
                                    const normForwardX = forwardX / forwardMag;
                                    const normForwardY = forwardY / forwardMag;
                                    const normForwardZ = forwardZ / forwardMag;
                                    
                                    // Right vector = Cross(Forward, LocalUp)
                                    const rightX = normForwardY * localUpZ - normForwardZ * localUpY;
                                    const rightY = normForwardZ * localUpX - normForwardX * localUpZ;
                                    const rightZ = normForwardX * localUpY - normForwardY * localUpX;
                                    const rightMag = Math.sqrt(rightX**2 + rightY**2 + rightZ**2);
                                    const normRightX = rightX / rightMag;
                                    const normRightY = rightY / rightMag;
                                    const normRightZ = rightZ / rightMag;
                                    
                                    // Corrected up vector = Cross(Right, Forward)
                                    const corrUpX = normRightY * normForwardZ - normRightZ * normForwardY;
                                    const corrUpY = normRightZ * normForwardX - normRightX * normForwardZ;
                                    const corrUpZ = normRightX * normForwardY - normRightY * normForwardX;
                                    
                                    // STEP 1: Apply horizon lock via camera.up vector
                                    camera.up.set(corrUpX, corrUpY, corrUpZ);
                                    
                                    // Point camera at vehicle
                                    camera.lookAt(currentPoint.x, currentPoint.y, currentPoint.z);
                                    
                                    // Set pivot and update spherical coords for manual controls
                                    cameraState.targetPivot.set(currentPoint.x, currentPoint.y, currentPoint.z);
                                    cameraState.pivotPoint.copy(cameraState.targetPivot);
                                    
                                    const relX = camX - currentPoint.x;
                                    const relY = camY - currentPoint.y;
                                    const relZ = camZ - currentPoint.z;
                                    cameraState.radius = Math.sqrt(relX**2 + relY**2 + relZ**2);
                                    cameraState.yaw = Math.atan2(relZ, relX);
                                    cameraState.pitch = Math.acos(relY / cameraState.radius);
                                    
                                    // Enable horizon lock flag for updateCameraFromSpherical
                                    cameraState.horizonLocked = true;
                                    document.getElementById('horizon-lock-btn').classList.add('active');
                                    
                                    console.log('✓ Chase view: Camera BEHIND velocity, horizon LOCKED');
                                }
                            }
                            
                            // Hide pivot indicator when locked, show when unlocked
                            pivotIndicator.visible = !cameraState.vehicleLocked;
                        }
                        break;
                    case 'h':
                    case 'H':
                        e.preventDefault();
                        if (cameraState.mode === 'trajectory') {
                            cameraState.horizonLocked = !cameraState.horizonLocked;
                            console.log(`Horizon lock: ${cameraState.horizonLocked ? 'ON' : 'OFF'}`);
                            updateCameraFromSpherical(); // Update camera orientation immediately
                        }
                        break;
                    case '.':
                    case '>':

                        break;
                    case ',':
                    case '<':
                        e.preventDefault();
                        updateWarpLevel(-1); // Decrease warp
                        break;
                    case '[':
